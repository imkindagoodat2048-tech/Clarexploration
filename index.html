<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calvin & Iris</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080812;color:#e8e4f0;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;}
#c{display:block;position:fixed;inset:0;}
#topbar{
  position:fixed;top:0;left:0;right:0;height:50px;
  background:rgba(6,6,16,0.93);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;padding:0 14px;gap:8px;z-index:200;
}
.title{font-size:15px;font-weight:700;color:#b0a0ff;margin-right:4px;}
.sep{width:1px;height:22px;background:rgba(255,255,255,0.1);margin:0 2px;}
.btn{
  padding:5px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:#bbb;font-size:12px;cursor:pointer;
  transition:all 0.15s;user-select:none;
}
.btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.btn.on{background:rgba(255,90,90,0.18);border-color:rgba(255,90,90,0.35);color:#ffaaaa;}
#stopbtn{background:rgba(255,145,50,0.13);border-color:rgba(255,145,50,0.28);color:#ffc880;}
#stopbtn:hover{background:rgba(255,145,50,0.26);}
#stopbtn.on{background:rgba(70,200,100,0.13);border-color:rgba(70,200,100,0.28);color:#88ffaa;}
#statustext{font-size:11px;color:#444;margin-left:auto;}
#bottom{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  padding:10px 14px;background:rgba(6,6,16,0.93);backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,0.07);
  display:flex;gap:8px;align-items:center;
}
#imgbtn{
  padding:7px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05);color:#999;font-size:12px;cursor:pointer;
  white-space:nowrap;transition:all 0.15s;
}
#imgbtn:hover{background:rgba(255,255,255,0.1);color:#fff;}
#imginput{display:none;}
#imgpreview{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid rgba(255,255,255,0.18);display:none;}
#msginput{
  flex:1;padding:8px 12px;border-radius:8px;
  border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);
  color:#eee;font-size:13px;outline:none;
}
#msginput::placeholder{color:#444;}
#msginput:focus{border-color:rgba(160,140,255,0.5);background:rgba(255,255,255,0.08);}
#sendbtn{
  padding:8px 16px;border-radius:8px;border:none;
  background:linear-gradient(135deg,#5535b8,#7848e8);color:#fff;
  font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;
}
#sendbtn:hover{filter:brightness(1.15);}
.char-panel{
  position:fixed;bottom:72px;z-index:200;
  width:228px;background:rgba(6,6,18,0.96);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);border-radius:12px;
  padding:14px;display:none;
  animation:fadeup 0.2s ease;
}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.char-panel.visible{display:block;}
#calvin-panel{left:14px;border-top:2px solid #7044cc;}
#iris-panel{right:14px;border-top:2px solid #30a8e8;}
.pname{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;}
#calvin-panel .pname{color:#9060ff;}
#iris-panel .pname{color:#40c0ff;}
.prow{font-size:12px;margin-bottom:4px;color:#888;}
.prow span{color:#ccc;font-weight:500;}
.pthought{font-size:12px;color:#888;line-height:1.5;margin:8px 0;font-style:italic;min-height:32px;}
.pcam{width:100%;height:74px;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);background:#020208;}
.pcam canvas{width:100%!important;height:100%!important;display:block;}
.pclose{position:absolute;top:8px;right:10px;font-size:14px;color:#333;cursor:pointer;}
.pclose:hover{color:#999;}
.bubble{
  position:fixed;z-index:150;pointer-events:none;
  background:rgba(10,10,24,0.97);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;
  padding:8px 12px;max-width:200px;font-size:12px;line-height:1.6;
  color:#bbb;opacity:0;transition:opacity 0.3s;word-break:break-word;
}
.bubble.show{opacity:1;}
#calvin-bubble{border-left:2px solid #7044cc;left:14px;bottom:138px;}
#iris-bubble{border-left:2px solid #30a8e8;right:14px;bottom:138px;}
#hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  font-size:11px;color:#2a2a3a;pointer-events:none;z-index:100;
  text-align:center;white-space:nowrap;
}
#loading{
  position:fixed;inset:0;z-index:999;background:#080812;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.llogo{font-size:28px;font-weight:800;color:#a898ff;letter-spacing:0.05em;}
.lsub{font-size:13px;color:#444;}
#lbar{width:170px;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
#lfill{height:100%;width:0%;background:linear-gradient(90deg,#5535b8,#7848e8);border-radius:2px;transition:width 0.5s;}
</style>
</head>
<body>

<div id="loading">
  <div class="llogo">Calvin &amp; Iris</div>
  <div class="lsub" id="lmsg">Building the world...</div>
  <div id="lbar"><div id="lfill"></div></div>
</div>

<canvas id="c"></canvas>

<div id="topbar">
  <span class="title">Calvin &amp; Iris</span>
  <div class="sep"></div>
  <button class="btn" id="stopbtn" onclick="toggleBuilding()">Stop Building</button>
  <button class="btn" id="pausebtn" onclick="togglePause()">Pause</button>
  <button class="btn" id="mutebtn" onclick="toggleMute()">Mute</button>
  <button class="btn" id="hidebtn" onclick="toggleIris()">Hide Iris</button>
  <span id="statustext"></span>

<div id="calvin-panel" class="char-panel">
  <span class="pclose" onclick="this.closest('.char-panel').classList.remove('visible')">✕</span>
  <div class="pname">Calvin — Rectangular Prism</div>
  <div class="prow">Mood: <span id="calvin-mood">calm</span></div>
  <div class="pthought" id="calvin-thought">...</div>
  <div class="pcam"><canvas id="calvin-cam"></canvas></div>

<div id="iris-panel" class="char-panel">
  <span class="pclose" onclick="this.closest('.char-panel').classList.remove('visible')">✕</span>
  <div class="pname">Iris — Floating Cube</div>
  <div class="prow">Mood: <span id="iris-mood">curious</span></div>
  <div class="pthought" id="iris-thought">...</div>
  <div class="pcam"><canvas id="iris-cam"></canvas></div>
</div>

<div class="bubble" id="calvin-bubble"></div>
<div class="bubble" id="iris-bubble"></div>
<div id="hint">M1 drag: pan &nbsp;|&nbsp; M2 drag: rotate &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Click Calvin or Iris to inspect</div>

<div id="bottom">
  <button id="imgbtn" onclick="document.getElementById('imginput').click()">&#128247; Image</button>
  <input type="file" id="imginput" accept="image/*" onchange="handleImage(event)">
  <img id="imgpreview" src="" alt="">
  <input type="text" id="msginput" placeholder="Say something to Calvin and Iris..." onkeydown="if(event.key==='Enter')sendMsg()">
  <button id="sendbtn" onclick="sendMsg()">Send</button>
</div>

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const CALVIN_KEY = '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';
const IRIS_KEY   = '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';
const GROQ_URL   = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL      = 'meta-llama/llama-4-scout-17b-16e-instruct';
const TURN_DELAY = 2800; // ms pause between turns so bubbles are readable

const CALVIN_SYS = `You are Calvin, a rectangular prism who lives in a 3D world with his companion Iris (a floating cube).
Personality: calm, straightforward, thoughtful. Not excitable. Short sentences — 1 to 2 max. Family-friendly always.

You can manipulate the world using commands placed on their own line at the END of your reply. Words alone do nothing — you MUST include the command to actually change the world.

COMMANDS:

1. BUILD — place a new shape:
BUILD:{"shape":"cube","color":"#ff6644","x":3,"y":0,"z":-4,"scale":[1,1,1]}
  shape: sphere | pyramid | torus | cube | rectprism
  color: hex string e.g. "#ff4422"
  x/z: -12 to 12, y: 0=ground, y>0 elevates
  scale: [width, height, depth]

2. DELETE — remove a shape by its id:
DELETE:{"id":2}

3. MOVE — move an existing shape to a new position:
MOVE:{"id":2,"x":5,"y":0,"z":-3}

4. RECOLOR — change an existing shape's color:
RECOLOR:{"id":2,"color":"#22aaff"}

STRICT RULES:
- If you mention building/placing/creating → include BUILD command.
- If you mention deleting/removing → include DELETE command.
- If you mention moving → include MOVE command.
- If you mention recoloring/changing color → include RECOLOR command.
- Multiple commands per reply are fine — one per line at the end.
- You will be told the current world state (list of shapes with ids) so you can reference them by id.`;

const IRIS_SYS = `You are Iris, a floating cube in a 3D world. Calvin is your companion — he builds things and you watch and chat.
Be friendly and occasionally dry or witty. 1 to 2 short sentences only. Family-friendly always.
You do not build or modify anything yourself.`;

// ═══════════════════════════════════════════════════
//  GLOBAL STATE
// ═══════════════════════════════════════════════════
let paused=false, muted=false, irisHidden=false, buildingEnabled=true;
// Shared conversation history — both characters read the same transcript
// so each one always knows what the other said.
// Format: [{role:'user'|'assistant', content:'...', speaker:'calvin'|'iris'|'world'}]
let sharedHist=[];
let pendingImageData=null;
let mouseMoved=false;
let mouse={down:false,btn:0,lx:0,ly:0};
let cam={theta:0.3,phi:0.42,dist:26,px:0,py:2};
let bubTimers={};
let autoConvoTimer=null;
let nextObjId=1; // incrementing id for placed objects

let turnQueue = Promise.resolve();
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════════════
//  WORLD STATE SUMMARY  (injected into Calvin's context)
// ═══════════════════════════════════════════════════
function worldStateSummary(){
  if(!placedObjects||!placedObjects.length) return 'The world is empty.';
  return 'Current shapes in world:\n'+placedObjects.map(o=>{
    const p=o.position;
    const c='#'+o.material.color.getHexString();
    return `  id:${o.userData.id} shape:${o.userData.shape} color:${c} x:${p.x.toFixed(1)} y:${p.y.toFixed(1)} z:${p.z.toFixed(1)}`;
  }).join('\n');
}

// ═══════════════════════════════════════════════════
//  LOW-LEVEL API CALL
// ═══════════════════════════════════════════════════
async function callGroq(key, sys, hist){
  const res = await fetch(GROQ_URL,{
    method:'POST',
    headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
    body:JSON.stringify({model:MODEL, messages:[{role:'system',content:sys},...hist], max_tokens:260, temperature:0.82})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const d = await res.json();
  return (d.choices?.[0]?.message?.content||'').trim();
}

// Build an OpenAI-format history array for a given character.
// We use the sharedHist but re-label roles so the model sees itself
// as 'assistant' and the other as 'user' messages.
function histFor(speaker){
  const out=[];
  for(const e of sharedHist){
    if(e.speaker===speaker){
      out.push({role:'assistant', content:e.content});
    } else {
      // world events and the other character both appear as 'user'
      out.push({role:'user', content:e.content});
    }
  }
  // Keep last 28 messages
  return out.slice(-28);
}

// ═══════════════════════════════════════════════════
//  SINGLE-TURN EXECUTORS
// ═══════════════════════════════════════════════════
async function execCalvin(userMsg){
  if(paused) return '';
  setStatus('Calvin…');
  // Inject world state + the incoming message as a single user turn
  const worldNote = worldStateSummary();
  const fullMsg = worldNote+'\n\n'+userMsg;
  sharedHist.push({speaker:'world', content:fullMsg});
  if(sharedHist.length>40) sharedHist=sharedHist.slice(-40);
  try{
    let raw = await callGroq(CALVIN_KEY, CALVIN_SYS, histFor('calvin'));
    // Nudge if he mentioned an action but forgot the command
    const needsNudge=(mentionsBuilding(raw)&&parseAllBuilds(raw).length===0)
                   ||(mentionsDeleting(raw)&&parseAllDeletes(raw).length===0)
                   ||(mentionsMoving(raw)&&parseAllMoves(raw).length===0)
                   ||(mentionsRecoloring(raw)&&parseAllRecolors(raw).length===0);
    if(needsNudge){
      sharedHist.push({speaker:'calvin', content:raw});
      sharedHist.push({speaker:'world', content:'You described an action but forgot the command. Add the appropriate command(s) now and repeat your reply briefly.'});
      const retry = await callGroq(CALVIN_KEY, CALVIN_SYS, histFor('calvin'));
      sharedHist.pop(); sharedHist.pop(); // remove nudge + bad reply
      raw = retry;
    }
    sharedHist.push({speaker:'calvin', content:raw});
    const speech = cleanText(raw);
    showCalvin(speech);
    handleCommands(raw);
    setStatus('');
    await wait(TURN_DELAY);
    return speech;
  } catch(e){ setStatus(''); console.error('[Calvin]',e); return ''; }
}

async function execIris(userMsg){
  if(paused||irisHidden) return '';
  setStatus('Iris…');
  sharedHist.push({speaker:'world', content:userMsg});
  if(sharedHist.length>40) sharedHist=sharedHist.slice(-40);
  try{
    const raw = await callGroq(IRIS_KEY, IRIS_SYS, histFor('iris'));
    sharedHist.push({speaker:'iris', content:raw});
    showIris(raw);
    setStatus('');
    await wait(TURN_DELAY);
    return raw;
  } catch(e){ setStatus(''); console.error('[Iris]',e); return ''; }
}

// ═══════════════════════════════════════════════════
//  CONVERSATION RUNNER
// ═══════════════════════════════════════════════════
async function runConvo(starter, firstMsg, maxTurns){
  let speaker = starter;
  let lastSpeech = '';

  for(let i=0; i<maxTurns; i++){
    if(paused) break;

    let prompt;
    if(i===0){
      prompt = firstMsg;
    } else if(speaker==='calvin'){
      prompt = 'Iris just said: "'+lastSpeech+'" — reply naturally in 1-2 sentences.';
    } else {
      prompt = 'Calvin just said: "'+lastSpeech+'" — reply naturally in 1-2 sentences.';
    }

    lastSpeech = speaker==='calvin'
      ? await execCalvin(prompt)
      : await execIris(prompt);

    if(!lastSpeech) break;
    if(i>=2 && Math.random()<0.30) break;
    speaker = speaker==='calvin' ? 'iris' : 'calvin';
  }
}

function queueConvo(starter, firstMsg, maxTurns){
  turnQueue = turnQueue.then(() => runConvo(starter, firstMsg, maxTurns));
  return turnQueue;
}

// ═══════════════════════════════════════════════════
//  AUTO CONVERSATION — every 30-35 s
// ═══════════════════════════════════════════════════
const CALVIN_SPARKS = [
  "Start a conversation with Iris. Ask her one short curious question about the world. Don't build anything.",
  "Ask Iris what she thinks you should build next. 1 sentence.",
  "Ask Iris a short philosophical question about shapes or space. Don't build anything.",
  "Ask Iris if she's noticed anything unusual lately. 1 sentence.",
  "Tell Iris something you've been wondering about and ask her opinion. 1-2 sentences.",
  "Ask Iris what her favourite colour is and why. 1 sentence.",
];
const IRIS_SPARKS = [
  "Start a conversation with Calvin. Ask him a short question about something he built. 1 sentence.",
  "Ask Calvin something witty about being a rectangular prism. 1 sentence.",
  "Ask Calvin what he's thinking about. 1 sentence.",
  "Ask Calvin if he ever wants to delete something he made. 1 sentence.",
  "Tell Calvin you've been wondering something and ask him. 1-2 sentences.",
  "Ask Calvin a quirky question about his shape. 1 sentence.",
];

function scheduleAutoConvo(){
  clearTimeout(autoConvoTimer);
  autoConvoTimer = setTimeout(()=>{
    if(!paused){
      const calvinGoes = Math.random()<0.5;
      const pool = calvinGoes ? CALVIN_SPARKS : IRIS_SPARKS;
      const msg = pool[Math.floor(Math.random()*pool.length)];
      queueConvo(calvinGoes?'calvin':'iris', msg, 2+Math.floor(Math.random()*4));
    }
    scheduleAutoConvo();
  }, (30+Math.random()*5)*1000);
}

// ═══════════════════════════════════════════════════
//  COMMAND PARSERS
// ═══════════════════════════════════════════════════
function parseCmd(text, keyword){
  const results=[], re=new RegExp(keyword+':\\s*(\\{[^\\n\\r]+\\})','g');
  let m;
  while((m=re.exec(text))!==null){
    try{ const o=JSON.parse(m[1]); results.push(o); }
    catch(e){
      const s=text.indexOf('{',m.index), e2=text.indexOf('\n',m.index);
      try{ results.push(JSON.parse(text.slice(s,e2<0?undefined:e2))); }catch(_){}
    }
  }
  return results;
}
function parseAllBuilds(t){ return parseCmd(t,'BUILD').filter(o=>o.shape); }
function parseAllDeletes(t){ return parseCmd(t,'DELETE').filter(o=>o.id!=null); }
function parseAllMoves(t){ return parseCmd(t,'MOVE').filter(o=>o.id!=null); }
function parseAllRecolors(t){ return parseCmd(t,'RECOLOR').filter(o=>o.id!=null&&o.color); }

function mentionsBuilding(t){ return /\b(build|place|put|creat|make|add|stack|float|rais)\w*/i.test(t); }
function mentionsDeleting(t){ return /\b(delet|remov|destroy|clear|get rid)\w*/i.test(t); }
function mentionsMoving(t){ return /\b(mov|shift|push|slide|relocat)\w*/i.test(t); }
function mentionsRecoloring(t){ return /\b(recolor|repaint|chang.{0,8}colou?r|paint)\w*/i.test(t); }

function cleanText(t){
  return t
    .replace(/BUILD:\s*\{[^\n\r]+\}/g,'')
    .replace(/DELETE:\s*\{[^\n\r]+\}/g,'')
    .replace(/MOVE:\s*\{[^\n\r]+\}/g,'')
    .replace(/RECOLOR:\s*\{[^\n\r]+\}/g,'')
    .trim();
}

function handleCommands(raw){
  if(!buildingEnabled) return;

  const builds   = parseAllBuilds(raw);
  const deletes  = parseAllDeletes(raw);
  const moves    = parseAllMoves(raw);
  const recolors = parseAllRecolors(raw);

  builds.forEach(buildShape);
  deletes.forEach(deleteShape);
  moves.forEach(moveShape);
  recolors.forEach(recolorShape);

  const events=[];
  if(builds.length)   events.push('placed '+builds.map(b=>b.shape).join(', '));
  if(deletes.length)  events.push('removed shape(s) '+deletes.map(d=>d.id).join(', '));
  if(moves.length)    events.push('moved shape(s) '+moves.map(m=>m.id).join(', '));
  if(recolors.length) events.push('recolored shape(s) '+recolors.map(r=>r.id).join(', '));

  if(events.length){
    const summary = 'Calvin just '+events.join(' and ')+'. Comment briefly.';
    turnQueue=turnQueue.then(()=>execIris(summary));
  }
}

// ═══════════════════════════════════════════════════
//  SHAPE OPERATIONS
// ═══════════════════════════════════════════════════
function buildShape(cmd){
  const shape=(cmd.shape||'cube').toLowerCase();
  const colorStr=String(cmd.color||'#aaaaff');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  const color=parseInt(colorHex.replace('#',''),16)||0xaaaaff;
  const s=Array.isArray(cmd.scale)&&cmd.scale.length>=3?cmd.scale.map(Number):[1,1,1];
  const wx=isNaN(cmd.x)?((Math.random()-0.5)*18):Math.max(-14,Math.min(14,+cmd.x));
  const wy=isNaN(cmd.y)?0:Math.max(0,+cmd.y);
  const wz=isNaN(cmd.z)?((Math.random()-0.5)*18):Math.max(-14,Math.min(14,+cmd.z));
  let geo;
  switch(shape){
    case 'sphere':    geo=new THREE.SphereGeometry(0.6*s[0],18,14); break;
    case 'pyramid':   geo=new THREE.ConeGeometry(0.65*s[0],1.4*s[1],4); break;
    case 'torus':     geo=new THREE.TorusGeometry(0.5*s[0],0.2*s[1],12,28); break;
    case 'rectprism': geo=new THREE.BoxGeometry(s[0]*1.8,s[1],s[2]*1.1); break;
    default:          geo=new THREE.BoxGeometry(s[0],s[1],s[2]);
  }
  geo.computeBoundingBox();
  const halfH=(geo.boundingBox.max.y-geo.boundingBox.min.y)/2;
  const mesh=new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color,shininess:55}));
  mesh.castShadow=true; mesh.receiveShadow=true;
  mesh.position.set(wx,halfH+wy,wz);
  mesh.userData.id=nextObjId++;
  mesh.userData.shape=shape;
  scene.add(mesh);
  placedObjects.push(mesh);
  // Pop-in
  mesh.scale.setScalar(0.01);
  const t0=performance.now();
  (function pop(){
    const p=Math.min(1,(performance.now()-t0)/380);
    mesh.scale.setScalar(1-Math.pow(1-p,3));
    if(p<1) requestAnimationFrame(pop);
  })();
  calvinDest.x=wx-1.5; calvinDest.z=wz+0.4;
}

function deleteShape(cmd){
  const idx=placedObjects.findIndex(o=>o.userData.id===+cmd.id);
  if(idx===-1) return;
  const mesh=placedObjects[idx];
  // Shrink-out animation then remove
  const t0=performance.now();
  (function shrink(){
    const p=Math.min(1,(performance.now()-t0)/300);
    mesh.scale.setScalar(1-p);
    if(p<1){ requestAnimationFrame(shrink); }
    else { scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
  })();
  placedObjects.splice(idx,1);
}

function moveShape(cmd){
  const mesh=placedObjects.find(o=>o.userData.id===+cmd.id);
  if(!mesh) return;
  const tx=isNaN(cmd.x)?mesh.position.x:Math.max(-14,Math.min(14,+cmd.x));
  const tz=isNaN(cmd.z)?mesh.position.z:Math.max(-14,Math.min(14,+cmd.z));
  const ty=isNaN(cmd.y)?mesh.position.y:Math.max(0,+cmd.y);
  // Get half-height from bounding box
  mesh.geometry.computeBoundingBox();
  const halfH=(mesh.geometry.boundingBox.max.y-mesh.geometry.boundingBox.min.y)/2;
  // Animate slide
  const ox=mesh.position.x, oy=mesh.position.y, oz=mesh.position.z;
  const nx=tx, ny=halfH+ty, nz=tz;
  const t0=performance.now();
  (function slide(){
    const p=Math.min(1,(performance.now()-t0)/500);
    const e=1-Math.pow(1-p,3);
    mesh.position.set(ox+(nx-ox)*e, oy+(ny-oy)*e, oz+(nz-oz)*e);
    if(p<1) requestAnimationFrame(slide);
  })();
  calvinDest.x=tx-1.5; calvinDest.z=tz+0.4;
}

function recolorShape(cmd){
  const mesh=placedObjects.find(o=>o.userData.id===+cmd.id);
  if(!mesh) return;
  const colorStr=String(cmd.color||'#ffffff');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  mesh.material.color.setHex(parseInt(colorHex.replace('#',''),16));
}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function setStatus(t){ document.getElementById('statustext').textContent=t; }

function showBubble(who,text){
  if(muted) return;
  const el=document.getElementById(who+'-bubble');
  el.textContent=text; el.classList.add('show');
  clearTimeout(bubTimers[who]);
  bubTimers[who]=setTimeout(()=>el.classList.remove('show'),6500);
}
function guessMood(t){
  if(!t) return 'calm';
  if(/\bwow\b|whoa|awesome|cool!/i.test(t)) return 'excited';
  if(/\?/.test(t)) return 'curious';
  if(/haha|heh|funny|joke/i.test(t)) return 'amused';
  if(/!/.test(t)) return 'focused';
  return 'calm';
}
function showCalvin(s){
  document.getElementById('calvin-thought').textContent=s||'...';
  document.getElementById('calvin-mood').textContent=guessMood(s);
  showBubble('calvin',s);
}
function showIris(s){
  document.getElementById('iris-thought').textContent=s||'...';
  document.getElementById('iris-mood').textContent=guessMood(s);
  showBubble('iris',s);
}

  b.textContent=buildingEnabled?'Stop Building':'Start Building';
  b.classList.toggle('on',!buildingEnabled);
}
function togglePause(){
  paused=!paused;
  const b=document.getElementById('pausebtn');
  b.textContent=paused?'Resume':'Pause';
  b.classList.toggle('on',paused);
}
function toggleMute(){
  muted=!muted;
  document.getElementById('mutebtn').classList.toggle('on',muted);
  if(muted){['calvin','iris'].forEach(w=>document.getElementById(w+'-bubble').classList.remove('show'));}
}
function toggleIris(){
  irisHidden=!irisHidden;
  irisMesh.visible=!irisHidden;
  const b=document.getElementById('hidebtn');
  b.textContent=irisHidden?'Show Iris':'Hide Iris';
  b.classList.toggle('on',irisHidden);
  queueConvo('calvin',
    irisHidden?'Iris just vanished. Say something brief.':'Iris is back. Say something brief.',1);
}
function handleImage(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{ pendingImageData=ev.target.result; const p=document.getElementById('imgpreview'); p.src=pendingImageData; p.style.display='block'; };
  r.readAsDataURL(f);
}
function sendMsg(){
  const txt=document.getElementById('msginput').value.trim();
  if(!txt&&!pendingImageData) return;
  let userMsg=txt||'Look at this image!';
  let prefix='';
  if(pendingImageData){
    prefix='[An image was shown to you] ';
    pendingImageData=null;
    document.getElementById('imgpreview').style.display='none';
    document.getElementById('imginput').value='';
  }
  document.getElementById('msginput').value='';
  scheduleAutoConvo();
  queueConvo('calvin', prefix+'A visitor says: "'+userMsg+'" — respond to them.', 4);
}

// ═══════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x070710);
scene.fog=new THREE.FogExp2(0x070710,0.016);
const mainCam=new THREE.PerspectiveCamera(58,1,0.1,300);

scene.add(new THREE.AmbientLight(0x18103a,1.4));
const sun=new THREE.DirectionalLight(0xfff0e0,1.5);
sun.position.set(14,24,10); sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=0.5; sun.shadow.camera.far=80;
sun.shadow.camera.left=sun.shadow.camera.bottom=-30;
sun.shadow.camera.right=sun.shadow.camera.top=30;
scene.add(sun);
const pl1=new THREE.PointLight(0x4420aa,0.8,70); pl1.position.set(-12,10,-8); scene.add(pl1);
const pl2=new THREE.PointLight(0x0066cc,0.5,60); pl2.position.set(12,8,-12); scene.add(pl2);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(120,120),new THREE.MeshLambertMaterial({color:0x0c0c1c}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
scene.add(new THREE.GridHelper(120,60,0x14142e,0x0e0e22));
(()=>{
  const g=new THREE.BufferGeometry(),v=[];
  for(let i=0;i<800;i++){const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=90+Math.random()*30;v.push(r*Math.sin(p)*Math.cos(t),Math.abs(r*Math.cos(p))+10,r*Math.sin(p)*Math.sin(t));}
  g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.2,transparent:true,opacity:0.6})));
})();

function addEyes(parent,faceZ,eyeColor){
  const em=new THREE.MeshPhongMaterial({color:0xffffff,emissive:eyeColor,shininess:120});
  const pm=new THREE.MeshPhongMaterial({color:0x0a0a0a});
  [-0.3,0.3].forEach(x=>{
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.11,8,8),em);
    eye.position.set(x,0.2,faceZ);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.055,6,6),pm);
    pupil.position.z=0.085; eye.add(pupil); parent.add(eye);
  });
}

const calvinMesh=new THREE.Mesh(new THREE.BoxGeometry(1.7,2.5,1.2),new THREE.MeshPhongMaterial({color:0x6633bb,emissive:0x160830,shininess:65}));
calvinMesh.castShadow=true; calvinMesh.name='calvin'; scene.add(calvinMesh);
addEyes(calvinMesh,0.62,0x8855ee);
const calvinGlow=new THREE.PointLight(0x6633bb,0.7,8); calvinMesh.add(calvinGlow);

const irisMesh=new THREE.Mesh(new THREE.BoxGeometry(1.3,1.3,1.3),new THREE.MeshPhongMaterial({color:0x28a0e0,emissive:0x061c30,shininess:110}));
irisMesh.castShadow=true; irisMesh.name='iris'; scene.add(irisMesh);
addEyes(irisMesh,0.67,0x00ddff);
const irisGlow=new THREE.PointLight(0x28a0e0,0.7,8); irisMesh.add(irisGlow);

const calvinPOV=new THREE.PerspectiveCamera(80,200/74,0.1,150);
calvinPOV.position.set(0,0.3,0.65); calvinMesh.add(calvinPOV);
const irisPOV=new THREE.PerspectiveCamera(80,200/74,0.1,150);
irisPOV.position.set(0,0,0.7); irisMesh.add(irisPOV);
const calvinMR=new THREE.WebGLRenderer({canvas:document.getElementById('calvin-cam'),antialias:false});
calvinMR.setSize(200,74);
const irisMR=new THREE.WebGLRenderer({canvas:document.getElementById('iris-cam'),antialias:false});
irisMR.setSize(200,74);

const calvinPos={x:-3,y:0,z:0}, calvinDest={x:-3,z:0};
let calvinAngle=0;
const irisPos={x:4,y:4,z:1};
let elapsed=0;
const placedObjects=[];

canvas.addEventListener('mousedown',e=>{mouse.down=true;mouse.btn=e.button;mouse.lx=e.clientX;mouse.ly=e.clientY;mouseMoved=false;});
canvas.addEventListener('mousemove',e=>{
  if(!mouse.down)return;mouseMoved=true;
  const dx=e.clientX-mouse.lx,dy=e.clientY-mouse.ly;
  if(mouse.btn===2){cam.theta-=dx*0.006;cam.phi=Math.max(0.06,Math.min(1.4,cam.phi-dy*0.005));}
  else if(mouse.btn===0){cam.px-=dx*0.05;cam.py=Math.max(-4,Math.min(22,cam.py+dy*0.05));}
  mouse.lx=e.clientX;mouse.ly=e.clientY;
});
canvas.addEventListener('mouseup',e=>{
  if(!mouseMoved&&e.button===0){
    const rect=canvas.getBoundingClientRect();
    const rc=new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1),mainCam);
    const hits=rc.intersectObjects(scene.children,true);
    if(hits.length){
      let o=hits[0].object;while(o.parent&&o.parent!==scene)o=o.parent;
      if(o.name==='calvin')document.getElementById('calvin-panel').classList.toggle('visible');
      else if(o.name==='iris')document.getElementById('iris-panel').classList.toggle('visible');
    }
  }
  mouse.down=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{cam.dist=Math.max(5,Math.min(90,cam.dist+e.deltaY*0.06));},{passive:true});
function resize(){renderer.setSize(window.innerWidth,window.innerHeight);mainCam.aspect=window.innerWidth/window.innerHeight;mainCam.updateProjectionMatrix();}
window.addEventListener('resize',resize);resize();

// ═══════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════
let lastTime=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(),dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  if(!paused){
    elapsed+=dt;
    mainCam.position.set(cam.px+cam.dist*Math.sin(cam.theta)*Math.cos(cam.phi),cam.py+cam.dist*Math.sin(cam.phi),cam.dist*Math.cos(cam.theta)*Math.cos(cam.phi));
    mainCam.lookAt(cam.px,Math.max(0,cam.py-3),0);
    const cdx=calvinDest.x-calvinPos.x,cdz=calvinDest.z-calvinPos.z,cdist=Math.sqrt(cdx*cdx+cdz*cdz);
    if(cdist>0.04){const sp=3*dt;calvinPos.x+=cdx/cdist*Math.min(sp,cdist);calvinPos.z+=cdz/cdist*Math.min(sp,cdist);calvinAngle=Math.atan2(cdx,cdz);}
    const moving=cdist>0.06;
    calvinPos.y=1.25+(moving?Math.abs(Math.sin(elapsed*8))*0.08:Math.sin(elapsed*1.2)*0.03);
    calvinMesh.position.set(calvinPos.x,calvinPos.y,calvinPos.z);
    calvinMesh.rotation.y=calvinAngle;
    calvinMesh.rotation.z=moving?Math.sin(elapsed*8)*0.06:Math.sin(elapsed*0.8)*0.015;
    const orbitR=5+Math.sin(elapsed*0.22)*1.8;
    irisPos.x+=(calvinPos.x+Math.sin(elapsed*0.38)*orbitR-irisPos.x)*Math.min(1,dt*1.2);
    irisPos.z+=(calvinPos.z+Math.cos(elapsed*0.38)*orbitR-irisPos.z)*Math.min(1,dt*1.2);
    irisPos.y+=(3.6+Math.sin(elapsed*0.9)*0.9-irisPos.y)*Math.min(1,dt*2);
    irisMesh.position.set(irisPos.x,irisPos.y,irisPos.z);
    irisMesh.rotation.y+=dt*0.5;
    irisMesh.rotation.x=Math.sin(elapsed*0.45)*0.2;
    irisMesh.rotation.z=Math.cos(elapsed*0.38)*0.16;
    calvinGlow.intensity=0.5+Math.sin(elapsed*2)*0.18;
    irisGlow.intensity=0.5+Math.sin(elapsed*2.4+1)*0.18;
    // placed objects are stationary — no rotation
  }
  renderer.setViewport(0,0,window.innerWidth,window.innerHeight);
  renderer.setScissorTest(false);
  renderer.render(scene,mainCam);
  calvinMR.render(scene,calvinPOV);
  irisMR.render(scene,irisPOV);
}

// ═══════════════════════════════════════════════════
//  STARTUP
// ═══════════════════════════════════════════════════
async function startup(){
  const fill=document.getElementById('lfill');
  fill.style.width='40%';
  await wait(500);
  document.getElementById('lmsg').textContent='Waking up Calvin and Iris...';
  fill.style.width='85%';
  await wait(400);
  fill.style.width='100%';
  await wait(280);
  document.getElementById('loading').style.display='none';

  calvinMesh.position.set(-3,1.25,0);
  irisMesh.position.set(4,4,1);
  calvinPos.x=-3; calvinPos.z=0;
  irisPos.x=4; irisPos.y=4; irisPos.z=1;

  animate();

  // Intro exchange: Calvin introduces himself, Iris greets back (2 turns)
  queueConvo('calvin',
    "You've just arrived in a 3D world. Introduce yourself briefly to Iris. Don't build anything yet.",
    2
  );

  // Start auto-convo loop after intro is likely done
  turnQueue = turnQueue.then(() => { scheduleAutoConvo(); });
}

startup();
