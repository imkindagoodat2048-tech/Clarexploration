// ═══════════════════════════════════════════════════
//  TEXTURE MAKER
// ═══════════════════════════════════════════════════
function makeTexture(type, c1Hex, c2Hex){
  const size=256;
  const cv=document.createElement('canvas');
  cv.width=cv.height=size;
  const ctx=cv.getContext('2d');
  const col1=c1Hex||'#ffffff';
  const col2=c2Hex||'#444444';
  switch((type||'').toLowerCase()){
    case 'checkerboard':{
      const sq=size/8;
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        ctx.fillStyle=(r+c)%2===0?col1:col2;
        ctx.fillRect(c*sq,r*sq,sq,sq);
      }
      break;
    }
    case 'stripes':{
      const sw=size/8;
      for(let i=0;i<8;i++){
        ctx.fillStyle=i%2===0?col1:col2;
        ctx.fillRect(0,i*sw,size,sw);
      }
      break;
    }
    case 'vstripes':{
      const sw=size/8;
      for(let i=0;i<8;i++){
        ctx.fillStyle=i%2===0?col1:col2;
        ctx.fillRect(i*sw,0,sw,size);
      }
      break;
    }
    case 'dots':{
      ctx.fillStyle=col1; ctx.fillRect(0,0,size,size);
      ctx.fillStyle=col2;
      for(let r=0;r<4;r++) for(let c=0;c<4;c++){
        ctx.beginPath();
        ctx.arc((c+0.5)*size/4,(r+0.5)*size/4,size/13,0,Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case 'grid':{
      ctx.fillStyle=col1; ctx.fillRect(0,0,size,size);
      ctx.strokeStyle=col2; ctx.lineWidth=size/28;
      const sq=size/6;
      for(let i=0;i<=6;i++){
        ctx.beginPath(); ctx.moveTo(i*sq,0); ctx.lineTo(i*sq,size); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i*sq); ctx.lineTo(size,i*sq); ctx.stroke();
      }
      break;
    }
    case 'bricks':{
      ctx.fillStyle=col2; ctx.fillRect(0,0,size,size);
      ctx.fillStyle=col1;
      const bh=size/6, bw=size/3;
      for(let r=0;r<7;r++){
        const off=r%2===0?0:bw/2;
        for(let c=-1;c<4;c++){
          ctx.fillRect(c*bw+off+3,r*bh+3,bw-6,bh-6);
        }
      }
      break;
    }
    default:{
      ctx.fillStyle=col1; ctx.fillRect(0,0,size,size);
    }
  }
  const tex=new THREE.CanvasTexture(cv);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  return tex;
}

// ═══════════════════════════════════════════════════
//  NPC SYSTEM
// ═══════════════════════════════════════════════════
function spawnNPC(cmd){
  const id=String(cmd.id||('npc_'+Date.now()));
  if(npcs[id]) deleteNPC(id);

  const colorStr=String(cmd.color||'#bbbbbb');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  const color=parseInt(colorHex.replace('#',''),16)||0xbbbbbb;
  const shape=(cmd.shape||'cube').toLowerCase();
  const s=Array.isArray(cmd.scale)&&cmd.scale.length>=3?cmd.scale.map(Number):[1,1,1];

  let geo;
  switch(shape){
    case 'sphere':   geo=new THREE.SphereGeometry(0.5*s[0],14,10); break;
    case 'pyramid':  geo=new THREE.ConeGeometry(0.55*s[0],1.2*s[1],4); break;
    case 'cylinder': geo=new THREE.CylinderGeometry(0.5*s[0],0.5*s[0],s[1],12); break;
    default:         geo=new THREE.BoxGeometry(s[0],s[1],s[2]);
  }
  geo.computeBoundingBox();
  const halfH=(geo.boundingBox.max.y-geo.boundingBox.min.y)/2;

  const wx=isNaN(cmd.x)?0:Math.max(-57,Math.min(57,+cmd.x));
  const wz=isNaN(cmd.z)?0:Math.max(-57,Math.min(57,+cmd.z));
  const wy=isNaN(cmd.y)?0:Math.max(0,+cmd.y);

  const mat=new THREE.MeshPhongMaterial({
    color,shininess:50,
    emissive:new THREE.Color(color).multiplyScalar(0.12)
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true;
  mesh.position.set(wx,halfH+wy,wz);

  const glow=new THREE.PointLight(color,0.5,6);
  mesh.add(glow);
  scene.add(mesh);

  // Pop-in
  mesh.scale.setScalar(0.01);
  const t0=performance.now();
  (function pop(){
    const p=Math.min(1,(performance.now()-t0)/380);
    mesh.scale.setScalar(1-Math.pow(1-p,3));
    if(p<1) requestAnimationFrame(pop);
  })();

  npcs[id]={
    mesh, name:String(cmd.name||id),
    behavior:cmd.behavior||'idle',
    speed:2.5, halfH,
    wanderTimer:0,
    wanderTarget:{x:wx,z:wz},
    wanderOrigin:{x:wx,z:wz},
    sayTimer:0
  };
}

function npcCmdExec(cmd){
  const npc=npcs[String(cmd.id)];
  if(!npc) return;
  switch(String(cmd.action)){
    case 'move':
      npc.wanderTarget={
        x:Math.max(-57,Math.min(57,isNaN(cmd.x)?npc.mesh.position.x:+cmd.x)),
        z:Math.max(-57,Math.min(57,isNaN(cmd.z)?npc.mesh.position.z:+cmd.z))
      };
      npc.behavior='moveto';
      break;
    case 'say':{
      const txt=String(cmd.text||'...');
      npc.sayTimer=6;
      setStatus(npc.name+': "'+txt+'"');
      setTimeout(()=>setStatus(''),6000);
      break;
    }
    case 'color':{
      const ch=parseInt(String(cmd.color||'#ffffff').replace('#',''),16);
      npc.mesh.material.color.setHex(ch);
      break;
    }
    case 'delete':
      deleteNPC(String(cmd.id));
      break;
    case 'behavior':
      npc.behavior=String(cmd.behavior||'idle');
      break;
  }
}

function deleteNPC(id){
  const npc=npcs[id]; if(!npc) return;
  const mesh=npc.mesh;
  const t0=performance.now();
  (function shrink(){
    const p=Math.min(1,(performance.now()-t0)/260);
    mesh.scale.setScalar(1-p);
    if(p<1){ requestAnimationFrame(shrink); }
    else{ scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
  })();
  delete npcs[id];
}

function updateNPCs(dt){

    const npc=npcs[id];
    const pos=npc.mesh.position;

          npc.wanderTarget={
            x:Math.max(-55,Math.min(55,pos.x+(Math.random()-0.5)*26)),
            z:Math.max(-55,Math.min(55,pos.z+(Math.random()-0.5)*26))
          };
        }
        // intentional fall-through for movement
      case 'moveto':{
        const dx=npc.wanderTarget.x-pos.x, dz=npc.wanderTarget.z-pos.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist>0.12){
          const sp=npc.speed*dt;
          pos.x+=dx/dist*Math.min(sp,dist);
          pos.z+=dz/dist*Math.min(sp,dist);
          npc.mesh.rotation.y=Math.atan2(dx,dz);
        } else if(npc.behavior==='moveto'){
          npc.behavior='idle';
        }
        break;
      }
      case 'follow':{
        const dx=calvinPos.x-pos.x, dz=calvinPos.z-pos.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist>3.5){
          const sp=npc.speed*dt;
          pos.x+=dx/dist*Math.min(sp,dist);
          pos.z+=dz/dist*Math.min(sp,dist);
          npc.mesh.rotation.y=Math.atan2(dx,dz);
        }
        break;
      }
      case 'patrol':{
        const dx=npc.wanderTarget.x-pos.x, dz=npc.wanderTarget.z-pos.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist<0.5){
          const tmp={...npc.wanderTarget};
          npc.wanderTarget={...npc.wanderOrigin};
          npc.wanderOrigin=tmp;
        } else {
          const sp=npc.speed*dt;
          pos.x+=dx/dist*Math.min(sp,dist);
          pos.z+=dz/dist*Math.min(sp,dist);
          npc.mesh.rotation.y=Math.atan2(dx,dz);
        }
        break;
      }
      case 'guard':
        npc.mesh.rotation.y+=dt*1.8;
        break;
    }
    pos.y=npc.halfH;
  }
}

//  WORLD STATE SUMMARY
// ═══════════════════════════════════════════════════
function worldStateSummary(){
  let out='';
  if(!placedObjects.length){ out+='The world is empty.\n'; }
  else{
    out+='Current shapes:\n'+placedObjects.map(o=>{
      const p=o.position;
      const c='#'+o.material.color.getHexString();
      return `  id:${o.userData.id} shape:${o.userData.shape} color:${c} x:${p.x.toFixed(1)} y:${p.y.toFixed(1)} z:${p.z.toFixed(1)}`;
    }).join('\n')+'\n';
  }
  const npcList=Object.entries(npcs);
  if(npcList.length){
    out+='Current NPCs:\n'+npcList.map(([id,n])=>
      `  id:"${id}" name:"${n.name}" behavior:${n.behavior} x:${n.mesh.position.x.toFixed(1)} z:${n.mesh.position.z.toFixed(1)}`
    ).join('\n')+'\n';
  }
  return out.trim()||'The world is empty.';
}

//  LOW-LEVEL API CALL
// ═══════════════════════════════════════════════════
async function callGroq(key,sys,hist){
  const res=await fetch(GROQ_URL,{
    method:'POST',
    headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
    body:JSON.stringify({
      model:MODEL,
      messages:[{role:'system',content:sys},...hist],
      max_tokens:340,
      temperature:0.94
    })
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const d=await res.json();
  return (d.choices?.[0]?.message?.content||'').trim();
}

function histFor(speaker){
  const out=[];
  for(const e of sharedHist){
    if(e.speaker===speaker) out.push({role:'assistant',content:e.content});
    else out.push({role:'user',content:e.content});
  }
  return out.slice(-28);
}

// ═══════════════════════════════════════════════════
//  SINGLE-TURN EXECUTORS
// ═══════════════════════════════════════════════════
async function execCalvin(userMsg){
  if(paused) return '';
  setStatus('Calvin is cookin something up…');
  const worldNote=worldStateSummary();
  const fullMsg=worldNote+'\n\n'+userMsg;
  sharedHist.push({speaker:'world',content:fullMsg});
  if(sharedHist.length>40) sharedHist=sharedHist.slice(-40);
  try{
    let raw=await callGroq(CALVIN_KEY,CALVIN_SYS,histFor('calvin'));
    // Silent pass
    if(!raw||raw==='.'||raw.length<2){
      sharedHist.push({speaker:'calvin',content:'.'});
      setStatus(''); return '';
    }
    // Nudge if action mentioned but command missing
    const needsNudge=
      (mentionsBuilding(raw)&&parseAllBuilds(raw).length===0)||
      (mentionsDeleting(raw)&&parseAllDeletes(raw).length===0)||
      (mentionsMoving(raw)&&parseAllMoves(raw).length===0)||
      (mentionsRecoloring(raw)&&parseAllRecolors(raw).length===0);
    if(needsNudge){
      sharedHist.push({speaker:'calvin',content:raw});
      sharedHist.push({speaker:'world',content:'You described an action but forgot the command. Add the command(s) now and repeat your reply briefly.'});
      const retry=await callGroq(CALVIN_KEY,CALVIN_SYS,histFor('calvin'));
      sharedHist.pop(); sharedHist.pop();
      raw=retry;
    }
    sharedHist.push({speaker:'calvin',content:raw});
    const speech=cleanText(raw);
    showCalvin(speech);
    handleCommands(raw);
    setStatus('');
    await wait(TURN_DELAY);
    return speech;
  } catch(e){ setStatus(''); console.error('[Calvin]',e); return ''; }
}

async function execIris(userMsg){
  if(paused||irisHidden) return '';
  setStatus('Iris…');
  sharedHist.push({speaker:'world',content:userMsg});
  if(sharedHist.length>40) sharedHist=sharedHist.slice(-40);
  try{
    const raw=await callGroq(IRIS_KEY,IRIS_SYS,histFor('iris'));
    sharedHist.push({speaker:'iris',content:raw});
    // Only surface a response if she actually said something
    if(raw&&raw!=='.'&&raw.length>2){
      showIris(raw);
    }
    setStatus('');
    await wait(TURN_DELAY);
    return (raw==='.')?'':raw;
  } catch(e){ setStatus(''); console.error('[Iris]',e); return ''; }
}

// ═══════════════════════════════════════════════════
//  CONVERSATION RUNNER
// ═══════════════════════════════════════════════════
async function runConvo(starter,firstMsg,maxTurns){
  let speaker=starter, lastSpeech='';
  for(let i=0;i<maxTurns;i++){
    if(paused) break;
    let prompt;
    if(i===0){
      prompt=firstMsg;
    } else if(speaker==='calvin'){
      prompt='Iris just said: "'+lastSpeech+'", reply naturally.';
    } else {
      prompt='Calvin just said: "'+lastSpeech+'",  reply naturally.';
    }
    lastSpeech=speaker==='calvin'?await execCalvin(prompt):await execIris(prompt);
    if(!lastSpeech) break;
    if(i>=2&&Math.random()<0.30) break;
    speaker=speaker==='calvin'?'iris':'calvin';
  }
}

function queueConvo(starter,firstMsg,maxTurns){
  turnQueue=turnQueue.then(()=>runConvo(starter,firstMsg,maxTurns));
  return turnQueue;
}

// ═══════════════════════════════════════════════════
//  COMMAND PARSERS
// ═══════════════════════════════════════════════════
function parseCmd(text,keyword){
  const results=[],re=new RegExp(keyword+':\\s*(\\{[^\\n\\r]+\\})','g');
  let m;
  while((m=re.exec(text))!==null){
    try{ results.push(JSON.parse(m[1])); }
    catch(e){
      const s=text.indexOf('{',m.index),e2=text.indexOf('\n',m.index);
      try{ results.push(JSON.parse(text.slice(s,e2<0?undefined:e2))); }catch(_){}
    }
  }
  return results;
}
function parseAllBuilds(t){   return parseCmd(t,'BUILD').filter(o=>o.shape); }
function parseAllDeletes(t){  return parseCmd(t,'DELETE').filter(o=>o.id!=null); }
function parseAllMoves(t){    return parseCmd(t,'MOVE').filter(o=>o.id!=null); }
function parseAllRecolors(t){ return parseCmd(t,'RECOLOR').filter(o=>o.id!=null&&o.color); }
function parseAllSpawnNPCs(t){return parseCmd(t,'SPAWN_NPC').filter(o=>o.id); }
function parseAllNPCCmds(t){  return parseCmd(t,'NPC_CMD').filter(o=>o.id&&o.action); }

function mentionsBuilding(t){   return /\b(build|place|put|creat|make|add|stack|float|rais|spawn|construct|erect|lay)\w*/i.test(t); }
function mentionsDeleting(t){   return /\b(delet|remov|destroy|clear|get rid|demolish|wipe)\w*/i.test(t); }
function mentionsMoving(t){     return /\b(mov|shift|push|slide|relocat|drag|pull)\w*/i.test(t); }
function mentionsRecoloring(t){ return /\b(recolor|repaint|chang.{0,8}colou?r|paint|dye)\w*/i.test(t); }

function cleanText(t){
  return t
    .replace(/BUILD:\s*\{[^\n\r]+\}/g,'')
    .replace(/DELETE:\s*\{[^\n\r]+\}/g,'')
    .replace(/MOVE:\s*\{[^\n\r]+\}/g,'')
    .replace(/RECOLOR:\s*\{[^\n\r]+\}/g,'')
    .replace(/SPAWN_NPC:\s*\{[^\n\r]+\}/g,'')
    .replace(/NPC_CMD:\s*\{[^\n\r]+\}/g,'')
    .trim();
}

function handleCommands(raw){
  if(!buildingEnabled) return;
  const builds    =parseAllBuilds(raw);
  const deletes   =parseAllDeletes(raw);
  const moves     =parseAllMoves(raw);
  const recolors  =parseAllRecolors(raw);
  const spawnList =parseAllSpawnNPCs(raw);
  const npcCmdsArr=parseAllNPCCmds(raw);

  builds.forEach(buildShape);
  deletes.forEach(deleteShape);
  moves.forEach(moveShape);
  recolors.forEach(recolorShape);
  spawnList.forEach(spawnNPC);
  npcCmdsArr.forEach(npcCmdExec);

  const events=[];
  if(builds.length)     events.push('placed '+builds.map(b=>b.shape).join(', '));
  if(deletes.length)    events.push('removed shape(s) '+deletes.map(d=>d.id).join(', '));
  if(moves.length)      events.push('moved shape(s) '+moves.map(m=>m.id).join(', '));
  if(recolors.length)   events.push('recolored shape(s) '+recolors.map(r=>r.id).join(', '));
  if(spawnList.length)  events.push('spawned NPC(s): '+spawnList.map(n=>n.name||n.id).join(', '));

  if(events.length){
    const summary='Calvin just '+events.join(' and ')+'. React if you feel like it.';
    turnQueue=turnQueue.then(()=>execIris(summary));
  }
}

// ═══════════════════════════════════════════════════
//  SHAPE OPERATIONS
// ═══════════════════════════════════════════════════
function buildShape(cmd){
  const shape=(cmd.shape||'cube').toLowerCase();
  const colorStr=String(cmd.color||'#aaaaff');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  const color=parseInt(colorHex.replace('#',''),16)||0xaaaaff;
  const s=Array.isArray(cmd.scale)&&cmd.scale.length>=3?cmd.scale.map(Number):[1,1,1];
  const wx=isNaN(cmd.x)?((Math.random()-0.5)*110):Math.max(-58,Math.min(58,+cmd.x));
  const wy=isNaN(cmd.y)?0:Math.max(0,+cmd.y);
  const wz=isNaN(cmd.z)?((Math.random()-0.5)*110):Math.max(-58,Math.min(58,+cmd.z));

  let geo;
  switch(shape){
    case 'sphere':    geo=new THREE.SphereGeometry(0.6*s[0],18,14); break;
    case 'pyramid':   geo=new THREE.ConeGeometry(0.65*s[0],1.4*s[1],4); break;
    case 'torus':     geo=new THREE.TorusGeometry(0.5*s[0],0.2*s[1],12,28); break;
    case 'cylinder':  geo=new THREE.CylinderGeometry(0.5*s[0],0.5*s[0],s[1],16); break;
    case 'rectprism': geo=new THREE.BoxGeometry(s[0]*1.8,s[1],s[2]*1.1); break;
    default:          geo=new THREE.BoxGeometry(s[0],s[1],s[2]);
  }
  geo.computeBoundingBox();
  const halfH=(geo.boundingBox.max.y-geo.boundingBox.min.y)/2;

  let mat;
  if(cmd.texture){
    const c2Str=String(cmd.color2||'');
    const c2Hex=c2Str.startsWith('#')?c2Str:(c2Str?'#'+c2Str:null);
    const tex=makeTexture(cmd.texture,colorHex,c2Hex);
    tex.repeat.set(Math.max(1,Math.round(s[0])),Math.max(1,Math.round(s[1])));
    mat=new THREE.MeshPhongMaterial({map:tex,shininess:40});
  } else {
    mat=new THREE.MeshPhongMaterial({color,shininess:55});
  }

  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true; mesh.receiveShadow=true;
  mesh.position.set(wx,halfH+wy,wz);
  mesh.userData.id=nextObjId++;
  mesh.userData.shape=shape;
  scene.add(mesh);
  placedObjects.push(mesh);

  mesh.scale.setScalar(0.01);
  const t0=performance.now();
  (function pop(){
    const p=Math.min(1,(performance.now()-t0)/380);
    mesh.scale.setScalar(1-Math.pow(1-p,3));
    if(p<1) requestAnimationFrame(pop);
  })();
  calvinDest.x=wx-1.5; calvinDest.z=wz+0.4;
}

function deleteShape(cmd){
  const idx=placedObjects.findIndex(o=>o.userData.id===+cmd.id);
  if(idx===-1) return;
  const mesh=placedObjects[idx];
  const t0=performance.now();
  (function shrink(){
    const p=Math.min(1,(performance.now()-t0)/300);
    mesh.scale.setScalar(1-p);
    if(p<1){ requestAnimationFrame(shrink); }
    else{ scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
  })();
  placedObjects.splice(idx,1);
}

function moveShape(cmd){
  const mesh=placedObjects.find(o=>o.userData.id===+cmd.id);
  if(!mesh) return;
  const tx=isNaN(cmd.x)?mesh.position.x:Math.max(-58,Math.min(58,+cmd.x));
  const tz=isNaN(cmd.z)?mesh.position.z:Math.max(-58,Math.min(58,+cmd.z));
  const ty=isNaN(cmd.y)?mesh.position.y:Math.max(0,+cmd.y);
  mesh.geometry.computeBoundingBox();
  const halfH=(mesh.geometry.boundingBox.max.y-mesh.geometry.boundingBox.min.y)/2;
  const ox=mesh.position.x,oy=mesh.position.y,oz=mesh.position.z;
  const nx=tx,ny=halfH+ty,nz=tz;
  const t0=performance.now();
  (function slide(){
    const p=Math.min(1,(performance.now()-t0)/500);
    const e=1-Math.pow(1-p,3);
    mesh.position.set(ox+(nx-ox)*e,oy+(ny-oy)*e,oz+(nz-oz)*e);
    if(p<1) requestAnimationFrame(slide);
  })();
  calvinDest.x=tx-1.5; calvinDest.z=tz+0.4;
}

function recolorShape(cmd){
  const mesh=placedObjects.find(o=>o.userData.id===+cmd.id);
  if(!mesh) return;
  const colorStr=String(cmd.color||'#ffffff');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  if(cmd.texture){
    const c2Hex=cmd.color2?String(cmd.color2).startsWith('#')?cmd.color2:'#'+cmd.color2:null;
    const tex=makeTexture(cmd.texture,colorHex,c2Hex);
    mesh.material.map=tex;
    mesh.material.color.setHex(0xffffff);
    mesh.material.needsUpdate=true;
  } else {
    mesh.material.map=null;
    mesh.material.color.setHex(parseInt(colorHex.replace('#',''),16));
    mesh.material.needsUpdate=true;
  }
}

// ═══════════════════════════════════════════════════
//  TARGET DETECTION  (who does the user's message address?)
// ═══════════════════════════════════════════════════
function detectTarget(msg){
  const lo=msg.toLowerCase();
  const calvinHit=/\bcalvin\b/.test(lo);
  const irisHit=/\biris\b/.test(lo);
  if(calvinHit&&!irisHit) return 'calvin';
  if(irisHit&&!calvinHit) return 'iris';
  return 'both';
}

function sendMsg(){
  const txt=document.getElementById('msginput').value.trim();
  if(!txt&&!pendingImageData) return;
  let userMsg=txt||'Look at this image!';
  let prefix='';
  if(pendingImageData){
    prefix='[An image was shown to you] ';
    pendingImageData=null;
    document.getElementById('imgpreview').style.display='none';
    document.getElementById('imginput').value='';
  }
  document.getElementById('msginput').value='';
  scheduleAutoConvo();

  const target=detectTarget(userMsg);
  if(target==='calvin'){
    queueConvo('calvin',prefix+'A visitor says to YOU specifically (not Iris): "'+userMsg+'" — respond to them.',2);
  } else if(target==='iris'){
    queueConvo('iris',prefix+'A visitor says to YOU specifically (not Calvin): "'+userMsg+'" — respond to them.',2);
  } else {
    queueConvo('calvin',prefix+'A visitor says: "'+userMsg+'" — respond to them.',4);
  }
}

const irisMesh=new THREE.Mesh(
  new THREE.BoxGeometry(1.3,1.3,1.3),
  new THREE.MeshPhongMaterial({color:0x28a0e0,emissive:0x061c30,shininess:110})
);
irisMesh.castShadow=true; irisMesh.name='iris'; scene.add(irisMesh);
addEyes(irisMesh,0.67,0x00ddff);
const irisGlow=new THREE.PointLight(0x28a0e0,0.7,8); irisMesh.add(irisGlow);

const calvinPOV=new THREE.PerspectiveCamera(80,200/74,0.1,300);
calvinPOV.position.set(0,0.3,0.65); calvinMesh.add(calvinPOV);
const irisPOV=new THREE.PerspectiveCamera(80,200/74,0.1,300);
irisPOV.position.set(0,0,0.7); irisMesh.add(irisPOV);

const calvinMR=new THREE.WebGLRenderer({canvas:document.getElementById('calvin-cam'),antialias:false});
calvinMR.setSize(200,74);
const irisMR=new THREE.WebGLRenderer({canvas:document.getElementById('iris-cam'),antialias:false});
irisMR.setSize(200,74);

const calvinPos={x:-3,y:0,z:0}, calvinDest={x:-3,z:0};
let calvinAngle=0;
const irisPos={x:4,y:4,z:1};

canvas.addEventListener('mousedown',e=>{mouse.down=true;mouse.btn=e.button;mouse.lx=e.clientX;mouse.ly=e.clientY;mouseMoved=false;});
canvas.addEventListener('mousemove',e=>{
  if(!mouse.down)return; mouseMoved=true;
  const dx=e.clientX-mouse.lx, dy=e.clientY-mouse.ly;
  if(mouse.btn===2){cam.theta-=dx*0.006;cam.phi=Math.max(0.06,Math.min(1.4,cam.phi-dy*0.005));}
  else if(mouse.btn===0){cam.px-=dx*0.05;cam.py=Math.max(-4,Math.min(22,cam.py+dy*0.05));}
  mouse.lx=e.clientX; mouse.ly=e.clientY;
});
canvas.addEventListener('mouseup',e=>{
  if(!mouseMoved&&e.button===0){
    const rect=canvas.getBoundingClientRect();
    const rc=new THREE.Raycaster();
    rc.setFromCamera(
      new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1),
      mainCam
    );
    const hits=rc.intersectObjects(scene.children,true);
    if(hits.length){
      let o=hits[0].object;
      while(o.parent&&o.parent!==scene) o=o.parent;
      if(o.name==='calvin') document.getElementById('calvin-panel').classList.toggle('visible');
      else if(o.name==='iris') document.getElementById('iris-panel').classList.toggle('visible');
    }
  }
  mouse.down=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{cam.dist=Math.max(5,Math.min(130,cam.dist+e.deltaY*0.07));},{passive:true});
function resize(){
  renderer.setSize(window.innerWidth,window.innerHeight);
  mainCam.aspect=window.innerWidth/window.innerHeight;
  mainCam.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

// ═══════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════
let lastTime=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(), dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  if(!paused){
    elapsed+=dt;
    mainCam.position.set(
      cam.px+cam.dist*Math.sin(cam.theta)*Math.cos(cam.phi),
      cam.py+cam.dist*Math.sin(cam.phi),
      cam.dist*Math.cos(cam.theta)*Math.cos(cam.phi)
    );
    mainCam.lookAt(cam.px,Math.max(0,cam.py-3),0);

    const cdx=calvinDest.x-calvinPos.x, cdz=calvinDest.z-calvinPos.z;
    const cdist=Math.sqrt(cdx*cdx+cdz*cdz);
    if(cdist>0.04){
      const sp=3*dt;
      calvinPos.x+=cdx/cdist*Math.min(sp,cdist);
      calvinPos.z+=cdz/cdist*Math.min(sp,cdist);
      calvinAngle=Math.atan2(cdx,cdz);
    }
    const moving=cdist>0.06;
    calvinPos.y=1.25+(moving?Math.abs(Math.sin(elapsed*8))*0.08:Math.sin(elapsed*1.2)*0.03);
    calvinMesh.position.set(calvinPos.x,calvinPos.y,calvinPos.z);
    calvinMesh.rotation.y=calvinAngle;
    calvinMesh.rotation.z=moving?Math.sin(elapsed*8)*0.06:Math.sin(elapsed*0.8)*0.015;

    const orbitR=5+Math.sin(elapsed*0.22)*1.8;
    irisPos.x+=(calvinPos.x+Math.sin(elapsed*0.38)*orbitR-irisPos.x)*Math.min(1,dt*1.2);
    irisPos.z+=(calvinPos.z+Math.cos(elapsed*0.38)*orbitR-irisPos.z)*Math.min(1,dt*1.2);
    irisPos.y+=(3.6+Math.sin(elapsed*0.9)*0.9-irisPos.y)*Math.min(1,dt*2);
    irisMesh.position.set(irisPos.x,irisPos.y,irisPos.z);
    irisMesh.rotation.y+=dt*0.5;
    irisMesh.rotation.x=Math.sin(elapsed*0.45)*0.2;
    irisMesh.rotation.z=Math.cos(elapsed*0.38)*0.16;

    calvinGlow.intensity=0.5+Math.sin(elapsed*2)*0.18;
    irisGlow.intensity=0.5+Math.sin(elapsed*2.4+1)*0.18;

    updateNPCs(dt);
  }
  renderer.setViewport(0,0,window.innerWidth,window.innerHeight);
  renderer.setScissorTest(false);
  renderer.render(scene,mainCam);
  calvinMR.render(scene,calvinPOV);
  irisMR.render(scene,irisPOV);
}

// ═══════════════════════════════════════════════════
//  STARTUP  (called only after successful verification)
// ═══════════════════════════════════════════════════
async function startup(){
  const fill=document.getElementById('lfill');
  fill.style.width='40%';
  await wait(500);
  document.getElementById('lmsg').textContent='Waking up Calvin and Iris...';
  fill.style.width='85%';
  await wait(400);
  fill.style.width='100%';
  await wait(280);
  document.getElementById('loading').style.display='none';

  calvinMesh.position.set(-3,1.25,0);
  irisMesh.position.set(4,4,1);
  calvinPos.x=-3; calvinPos.z=0;
  irisPos.x=4; irisPos.y=4; irisPos.z=1;

  animate();

  queueConvo('calvin',
    "You've just woken up in a MASSIVE 3D world. Introduce yourself to Iris in your most unhinged way. Build something absurd and textured to mark the occasion.",
    2
  );

  turnQueue=turnQueue.then(()=>{ scheduleAutoConvo(); });
}
</script>
</body>
</html>
