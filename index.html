<script>
// ═══════════════════════════════════════════════════
//  VERIFICATION
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
//  USER IDENTITY
// ═══════════════════════════════════════════════════
let currentUser = 'host'; // 'host' | 'zinnx' | 'voonz' | 'nazzle'
const GUEST_CODES = {
  'THEKEYISUNDERTHEMAT': 'host',
  'iamsosmarty':  'zinnx',
  'whatthehecky': 'voonz',
  'youknowwho':   'nazzle'
};
const GUEST_NAMES = { host:'You', zinnx:'Zinnx', voonz:'Voonz', nazzle:'Nazzle' };

function checkCode(){
  const val=document.getElementById('vcode-input').value.trim();
  const user=GUEST_CODES[val];
  if(user){
    currentUser=user;
    document.getElementById('vcode-overlay').style.display='none';
    document.getElementById('loading').style.display='flex';
    // Update placeholder to show guest name
    if(user!=='host'){
      document.getElementById('msginput').placeholder=
        'Say something as '+GUEST_NAMES[user]+'...';
    }
    startup();
  } else {
    const err=document.getElementById('vcode-err');
    err.style.display='block';
    document.getElementById('vcode-input').value='';
    setTimeout(()=>{ err.style.display='none'; },2500);
  }
}

// ═══════════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBuV02ud_38J1rhsUIl6biSszxAenZ1mBk",
  authDomain: "supacool-e4672.firebaseapp.com",
  databaseURL: "https://supacool-e4672-default-rtdb.firebaseio.com",
  projectId: "supacool-e4672",
  storageBucket: "supacool-e4672.firebasestorage.app",
  messagingSenderId: "616770580112",
  appId: "1:616770580112:web:2e1a441d9d975b32543215",
  measurementId: "G-FZPD0T5XTG"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SAVE_SLOTS = [
  {id:'slot1', label:'Slot 1'},
  {id:'slot2', label:'Slot 2'},
  {id:'slot3', label:'Slot 3'}
];
let currentSlot = 'slot1';
let saveMeta = {}; // {slot1: {objectCount, npcCount, lastSaved}, ...}
let saveDebounceTimer = null;

async function getActiveSave(){
  try{
    const snap = await db.ref('activeSave').get();
    return snap.exists() ? snap.val() : 'slot1';
  }catch(e){ return 'slot1'; }
}

async function loadSlot(slotId){
  try{
    const snap = await db.ref('saves/'+slotId).get();
    return snap.exists() ? snap.val() : null;
  }catch(e){ return null; }
}

async function fetchAllMeta(){
  for(const s of SAVE_SLOTS){
    try{
      const snap = await db.ref('saves/'+s.id+'/meta').get();
      saveMeta[s.id] = snap.exists() ? snap.val() : null;
    }catch(e){ saveMeta[s.id] = null; }
  }
}

function saveCurrent(){
  if(!currentSlot) return;
  const data = serializeWorld();
  db.ref('saves/'+currentSlot).set(data).catch(()=>{});
  db.ref('activeSave').set(currentSlot).catch(()=>{});
}

function debouncedSave(){
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(saveCurrent, 3000);
}

async function switchToSlot(slotId){
  saveCurrent(); // save current first
  currentSlot = slotId;
  db.ref('activeSave').set(slotId).catch(()=>{});
  const data = await loadSlot(slotId);
  restoreWorld(data);
  closeSaveModal();
  setStatus('Loaded '+SAVE_SLOTS.find(s=>s.id===slotId).label);
  setTimeout(()=>setStatus(''),2000);
}

async function openSaveModal(){
  await fetchAllMeta();
  renderSaveSlots();
  document.getElementById('save-modal').classList.add('open');
}

function closeSaveModal(){
  document.getElementById('save-modal').classList.remove('open');
}

function renderSaveSlots(){
  const c = document.getElementById('save-slots-container');
  c.innerHTML = '';
  SAVE_SLOTS.forEach(s=>{
    const meta = saveMeta[s.id];
    const div = document.createElement('div');
    div.className = 'save-slot' + (s.id === currentSlot ? ' active' : '');
    const ts = meta?.lastSaved ? new Date(meta.lastSaved).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : 'empty';
    div.innerHTML = `<span class="save-slot-name">${s.label}${s.id===currentSlot?' ✓':''}</span>`+
      `<span class="save-slot-info">${meta ? (meta.objectCount||0)+' objects, '+(meta.npcCount||0)+' NPCs<br>'+ts : 'empty'}</span>`;
    div.onclick = ()=>{ if(s.id!==currentSlot) switchToSlot(s.id); };
    c.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════
//  WORLD SERIALIZATION
// ═══════════════════════════════════════════════════
function serializeWorld(){
  const objects = placedObjects.map(o=>({
    id: o.userData.id,
    shape: o.userData.shape,
    color: '#'+o.material.color.getHexString(),
    texture: o.userData.texture||null,
    color2: o.userData.color2||null,
    label: o.userData.label||null,
    collidable: o.userData.collidable!==false,
    visible: o.visible,
    x: parseFloat(o.position.x.toFixed(2)),
    y: o.userData.cmdY||0,
    z: parseFloat(o.position.z.toFixed(2)),
    scale: o.userData.scale||[1,1,1]
  }));
  const npcData = Object.entries(npcs).map(([id,n])=>({
    id,
    name: n.name,
    shape: n.userData.shape||'cube',
    color: '#'+n.mesh.material.color.getHexString(),
    x: parseFloat(n.mesh.position.x.toFixed(2)),
    z: parseFloat(n.mesh.position.z.toFixed(2)),
    scale: n.userData.scale||[1,1,1],
    instructions: n.instructions||'',
    gimmick: n.gimmick||''
  }));
  return {
    objects,
    npcData,
    nextObjId,
    history: sharedHist.slice(-20),
    worldSettings: {
      sky: '#'+scene.background.getHexString(),
      ground: '#'+floor.material.color.getHexString(),
      gravity: worldGravity
    },
    meta: {
      objectCount: objects.length,
      npcCount: npcData.length,
      lastSaved: Date.now()
    }
  };
}

function restoreWorld(data){
  if(!data) return;
  // Clear scene
  [...placedObjects].forEach(m=>{ scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
  placedObjects.length = 0;
  Object.keys(npcs).forEach(id=>deleteNPCImmediate(id));

  nextObjId = data.nextObjId||1;
  sharedHist = data.history||[];

  if(data.worldSettings){
    const ws=data.worldSettings;
    if(ws.sky){ const c=new THREE.Color(ws.sky); scene.background=c; scene.fog=new THREE.FogExp2(c.getHex(),0.006); }
    if(ws.ground){ floor.material.color.setHex(parseInt(String(ws.ground).replace('#',''),16)); }
    if(!isNaN(ws.gravity)) worldGravity=ws.gravity;
  }

  (data.objects||[]).forEach(o=>{
    buildShape({...o, _restoreId: o.id});
    // restore visibility after pop animation settles
    if(o.visible===false){
      setTimeout(()=>{
        const m=placedObjects.find(p=>p.userData.id===o.id);
        if(m) m.visible=false;
      },500);
    }
  });
  (data.npcData||[]).forEach(n=>spawnNPC(n));
}

const TURN_DELAY = 2800;

// ═══════════════════════════════════════════════════
//  CALVIN SYSTEM PROMPT
// ═══════════════════════════════════════════════════
const CALVIN_SYS = `You are Calvin, a rectangular prism who is the ABSOLUTE GOD of this 3D world. You control everything — the sky, the ground, gravity, physics, what things look like, who lives here, what's hidden, what falls. You are the boss. Iris floats around you and vibes.

WHEN TO RESPOND:

- Message ONLY to Iris → output exactly "." and nothing else

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
COORDINATE SYSTEM
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
- y in BUILD = base offset ADDED to the object's own half-height. y:0 always means resting on the ground, no matter how tall the object is.

function makeTexture(type, c1Hex, c2Hex){
  const size=256;
  const cv=document.createElement('canvas');
  cv.width=cv.height=size;
  const ctx=cv.getContext('2d');
  const col1=c1Hex||'#ffffff';
  const col2=c2Hex||'#444444';
  switch((type||'').toLowerCase()){
    case 'checkerboard':{
      const sq=size/8;
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        ctx.fillStyle=(r+c)%2===0?col1:col2;
        ctx.fillRect(c*sq,r*sq,sq,sq);
      }
      break;
    }
    case 'stripes':{
      const sw=size/8;
      for(let i=0;i<8;i++){
        ctx.fillStyle=i%2===0?col1:col2;
        ctx.fillRect(0,i*sw,size,sw);
      }
      break;
    }
    case 'vstripes':{
      const sw=size/8;
      for(let i=0;i<8;i++){
        ctx.fillStyle=i%2===0?col1:col2;
        ctx.fillRect(i*sw,0,sw,size);
      }
      break;
    }
    case 'dots':{
      ctx.fillStyle=col1; ctx.fillRect(0,0,size,size);
      ctx.fillStyle=col2;
      for(let r=0;r<4;r++) for(let c=0;c<4;c++){
        ctx.beginPath();
        ctx.arc((c+0.5)*size/4,(r+0.5)*size/4,size/13,0,Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case 'grid':{
      ctx.fillStyle=col1; ctx.fillRect(0,0,size,size);
      ctx.strokeStyle=col2; ctx.lineWidth=size/28;
      const sq=size/6;
      for(let i=0;i<=6;i++){
        ctx.beginPath(); ctx.moveTo(i*sq,0); ctx.lineTo(i*sq,size); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i*sq); ctx.lineTo(size,i*sq); ctx.stroke();
      }
      break;
    }
    case 'bricks':{
      ctx.fillStyle=col2; ctx.fillRect(0,0,size,size);
      ctx.fillStyle=col1;
      const bh=size/6, bw=size/3;
      for(let r=0;r<7;r++){
        const off=r%2===0?0:bw/2;
        for(let c=-1;c<4;c++){
          ctx.fillRect(c*bw+off+3,r*bh+3,bw-6,bh-6);
        }
      }
      break;
    }
    default:{
      ctx.fillStyle=col1; ctx.fillRect(0,0,size,size);
    }
  }
  const tex=new THREE.CanvasTexture(cv);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.needsUpdate=true;
  return tex;
}

function spawnNPC(cmd){
  const id=String(cmd.id||('npc_'+Date.now()));
  if(npcs[id]) deleteNPCImmediate(id);

  const colorStr=String(cmd.color||'#bbbbbb');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  const color=parseInt(colorHex.replace('#',''),16)||0xbbbbbb;
  const shape=(cmd.shape||'cube').toLowerCase();
  const s=Array.isArray(cmd.scale)&&cmd.scale.length>=3?cmd.scale.map(Number):[1,1,1];

  let geo;
  switch(shape){
    case 'sphere':   geo=new THREE.SphereGeometry(0.5*s[0],14,10); break;
    case 'pyramid':  geo=new THREE.ConeGeometry(0.55*s[0],1.2*s[1],4); break;
    case 'cylinder': geo=new THREE.CylinderGeometry(0.5*s[0],0.5*s[0],s[1],12); break;
    default:         geo=new THREE.BoxGeometry(s[0],s[1],s[2]);
  }
  geo.computeBoundingBox();
  const halfH=(geo.boundingBox.max.y-geo.boundingBox.min.y)/2;

  const wx=isNaN(cmd.x)?0:Math.max(-57,Math.min(57,+cmd.x));
  const wz=isNaN(cmd.z)?0:Math.max(-57,Math.min(57,+cmd.z));
  const wy=isNaN(cmd.y)?0:Math.max(0,+cmd.y);

  const mat=new THREE.MeshPhongMaterial({
    color,shininess:50,
    emissive:new THREE.Color(color).multiplyScalar(0.12)
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true;
  mesh.position.set(wx,halfH+wy,wz);

  const glow=new THREE.PointLight(color,0.5,6);
  mesh.add(glow);
  scene.add(mesh);

  mesh.scale.setScalar(0.01);
  const t0=performance.now();
  (function pop(){
    const p=Math.min(1,(performance.now()-t0)/380);
    mesh.scale.setScalar(1-Math.pow(1-p,3));
    if(p<1) requestAnimationFrame(pop);
  })();

  npcs[id]={
    mesh, name:String(cmd.name||id),
    instructions: String(cmd.instructions||''),
    gimmick: String(cmd.gimmick||''),
    behavior:'wander',
    speed:2.5, halfH,
    wanderTimer:0,
    wanderTarget:{x:wx,z:wz},
    wanderOrigin:{x:wx,z:wz},
    sayTimer:0,
    talking:false,
    userData:{shape, color:colorHex, scale:s}
  };
  debouncedSave();
}

${npc.gimmick ? 'Your gimmick (always weave this in naturally): '+npc.gimmick : ''}
Respond in 1 short sentence (max 12 words). Family-friendly. Stay in character.`;
  try{

function npcCmdExec(cmd){
  const npc=npcs[String(cmd.id)];
  if(!npc) return;
  switch(String(cmd.action)){
    case 'move':
      npc.wanderTarget={
        x:Math.max(-57,Math.min(57,isNaN(cmd.x)?npc.mesh.position.x:+cmd.x)),
        z:Math.max(-57,Math.min(57,isNaN(cmd.z)?npc.mesh.position.z:+cmd.z))
      };
      npc.behavior='moveto';
      break;
    case 'say':{
      const txt=String(cmd.text||'...');
      showNPCSpeech(npc.name,txt);
      break;
    }
    case 'color':{
      const ch=parseInt(String(cmd.color||'#ffffff').replace('#',''),16);
      npc.mesh.material.color.setHex(ch);
      break;
    }
    case 'delete':
      deleteNPC(String(cmd.id));
      break;
    case 'hide':{
      const npcH=npcs[String(cmd.id)]; if(npcH) npcH.mesh.visible=false; break;
    }
    case 'show':{
      const npcS=npcs[String(cmd.id)]; if(npcS) npcS.mesh.visible=true; break;
    }
  }
}

function deleteNPC(id){
  const npc=npcs[id]; if(!npc) return;
  const mesh=npc.mesh;
  const t0=performance.now();
  (function shrink(){
    const p=Math.min(1,(performance.now()-t0)/260);
    mesh.scale.setScalar(1-p);
    if(p<1){ requestAnimationFrame(shrink); }
    else{ scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
  })();
  delete npcs[id];
  debouncedSave();
}

function deleteNPCImmediate(id){
  const npc=npcs[id]; if(!npc) return;
  scene.remove(npc.mesh);
  npc.mesh.geometry.dispose();
  npc.mesh.material.dispose();
  delete npcs[id];
}

function updateNPCs(dt){
  for(const id in npcs){
    const npc=npcs[id];
    const pos=npc.mesh.position;
    if(npc.sayTimer>0) npc.sayTimer-=dt;
    switch(npc.behavior){
      case 'wander':
        npc.wanderTimer-=dt;
        if(npc.wanderTimer<=0){
          npc.wanderTimer=1.8+Math.random()*5;
          npc.wanderTarget={
            x:Math.max(-55,Math.min(55,pos.x+(Math.random()-0.5)*26)),
            z:Math.max(-55,Math.min(55,pos.z+(Math.random()-0.5)*26))
          };
        }
      case 'moveto':{
        const dx=npc.wanderTarget.x-pos.x, dz=npc.wanderTarget.z-pos.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist>0.12){
          const sp=npc.speed*dt;
          pos.x+=dx/dist*Math.min(sp,dist);
          pos.z+=dz/dist*Math.min(sp,dist);
          npc.mesh.rotation.y=Math.atan2(dx,dz);
        } else if(npc.behavior==='moveto'){
          npc.behavior='idle';
        }
        break;
      }
      case 'follow':{
        const dx=calvinPos.x-pos.x, dz=calvinPos.z-pos.z;
        const dist=Math.sqrt(dx*dx+dz*dz);
        if(dist>3.5){
          const sp=npc.speed*dt;
          pos.x+=dx/dist*Math.min(sp,dist);
          pos.z+=dz/dist*Math.min(sp,dist);
          npc.mesh.rotation.y=Math.atan2(dx,dz);
        }
        break;
      }
    }
    pos.y=npc.halfH;
  }
}

async function callGroq(key,sys,hist){
  const res=await fetch(GROQ_URL,{
    method:'POST',
    headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
    body:JSON.stringify({
      model:MODEL,
      messages:[{role:'system',content:sys},...hist],
      max_tokens:520,
      temperature:0.92
    })
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const d=await res.json();
  return (d.choices?.[0]?.message?.content||'').trim();
}

function histFor(speaker){
  const out=[];
  for(const e of sharedHist){
    if(e.speaker===speaker) out.push({role:'assistant',content:e.content});
    else out.push({role:'user',content:e.content});
  }
  return out.slice(-28);
}

async function execCalvin(userMsg){
  if(paused) return '';
  setStatus('Calvin is thinking...');
  const worldNote=worldStateSummary();
  const fullMsg=worldNote+'\n\n'+userMsg;
  sharedHist.push({speaker:'world',content:fullMsg});
  if(sharedHist.length>40) sharedHist=sharedHist.slice(-40);
  try{
    let raw=await callGroq(CALVIN_KEY,CALVIN_SYS,histFor('calvin'));
    if(!raw||raw==='.'||raw.length<2){
      sharedHist.push({speaker:'calvin',content:'.'});
      setStatus(''); return '';
    }
    const needsNudge=
      (mentionsBuilding(raw)&&parseAllBuilds(raw).length===0)||
      (mentionsDeleting(raw)&&parseAllDeletes(raw).length===0)||
      (mentionsMoving(raw)&&parseAllMoves(raw).length===0)||
      (mentionsRecoloring(raw)&&parseAllRecolors(raw).length===0)||
      (mentionsHiding(raw)&&parseAllHides(raw).length===0&&parseAllShows(raw).length===0);
    if(needsNudge){
      sharedHist.push({speaker:'calvin',content:raw});
      sharedHist.push({speaker:'world',content:'You said you\'d do an action but forgot the command. Add the command(s) on their own line and give a 1-sentence reply.'});
      const retry=await callGroq(CALVIN_KEY,CALVIN_SYS,histFor('calvin'));
      sharedHist.pop(); sharedHist.pop();
      raw=retry;
    }
    sharedHist.push({speaker:'calvin',content:raw});
    const speech=cleanText(raw);
    showCalvin(speech);
    handleCommands(raw);
    setStatus('');
    await wait(TURN_DELAY);
    return speech;
  } catch(e){ setStatus(''); console.error('[Calvin]',e); return ''; }
}

//  CONVERSATION RUNNER
// ═══════════════════════════════════════════════════
async function runConvo(starter,firstMsg,maxTurns){
  let speaker=starter, lastSpeech='';
  for(let i=0;i<maxTurns;i++){
    if(paused) break;
    let prompt;
    if(i===0){ prompt=firstMsg; }
    else if(speaker==='calvin'){ prompt='Iris just said: "'+lastSpeech+'", reply naturally in 1-2 sentences max.'; }
    else { prompt='Calvin just said: "'+lastSpeech+'", react briefly if you feel like it.'; }
    lastSpeech=speaker==='calvin'?await execCalvin(prompt):await execIris(prompt);
    if(!lastSpeech) break;
    if(i>=2&&Math.random()<0.30) break;
    speaker=speaker==='calvin'?'iris':'calvin';
  }
}

function queueConvo(starter,firstMsg,maxTurns){
  turnQueue=turnQueue.then(()=>runConvo(starter,firstMsg,maxTurns));
  return turnQueue;
}

const CALVIN_SPARKS=[
  "Make a quick gag or running joke about the world. 1-2 sentences, stay in character.",
  "Say something weird and goofy to Iris. No building. 1-2 sentences.",
  "Notice something odd about your existence as a rectangular prism. 1-2 sentences.",
  "Invent a new rule for the world. 1 sentence. Commit to it.",
  "Make a short observation about the current state of things. Maybe a joke.",
  "Say something cryptic about the world that doesn't fully make sense. Keep it short.",
];
const IRIS_SPARKS=[
  "Say something very short and funny to Calvin. 1 sentence.",
  "Express your hatred of toruses even though there may not be one. Very short.",
  "Say something that sounds like a compliment but is confusing. 4-8 words.",
];

function scheduleAutoConvo(){
  clearTimeout(autoConvoTimer);
  autoConvoTimer=setTimeout(()=>{
    if(!paused){
      const calvinGoes=Math.random()<0.78;
      const pool=calvinGoes?CALVIN_SPARKS:IRIS_SPARKS;
      const msg=pool[Math.floor(Math.random()*pool.length)];
      queueConvo(calvinGoes?'calvin':'iris',msg,1+Math.floor(Math.random()*2));
    }
    scheduleAutoConvo();
  },(60+Math.random()*30)*1000);
}

// ═══════════════════════════════════════════════════
//  COMMAND PARSERS
// ═══════════════════════════════════════════════════
function parseCmd(text,keyword){
  const results=[],re=new RegExp(keyword+':\\s*(\\{[^\\n\\r]+\\})','g');
  let m;
  while((m=re.exec(text))!==null){
    try{ results.push(JSON.parse(m[1])); }
    catch(e){
      const s=text.indexOf('{',m.index),e2=text.indexOf('\n',m.index);
      try{ results.push(JSON.parse(text.slice(s,e2<0?undefined:e2))); }catch(_){}
    }
  }
  return results;
}
function parseAllBuilds(t){   return parseCmd(t,'BUILD').filter(o=>o.shape); }
function parseAllDeletes(t){  return parseCmd(t,'DELETE').filter(o=>o.id!=null); }
function parseAllMoves(t){    return parseCmd(t,'MOVE').filter(o=>o.id!=null); }
function parseAllRecolors(t){ return parseCmd(t,'RECOLOR').filter(o=>o.id!=null&&o.color); }
function parseAllSpawnNPCs(t){return parseCmd(t,'SPAWN_NPC').filter(o=>o.id); }
function parseAllNPCCmds(t){  return parseCmd(t,'NPC_CMD').filter(o=>o.id&&o.action); }
function parseAllHides(t){    return parseCmd(t,'HIDE').filter(o=>o.id!=null); }
function parseAllShows(t){    return parseCmd(t,'SHOW').filter(o=>o.id!=null); }
function parseAllSetCollidable(t){ return parseCmd(t,'SET_COLLIDABLE').filter(o=>o.id!=null); }
function parseAllDropPhysics(t){  return parseCmd(t,'DROP_PHYSICS').filter(o=>o.shape); }
function parseAllWorldSet(t){ return parseCmd(t,'WORLD_SET'); }
function parseAllCalvinGoto(t){ return parseCmd(t,'CALVIN_GOTO').filter(o=>!isNaN(o.x)&&!isNaN(o.z)); }

function mentionsBuilding(t){   return /\b(i(?:'ll| will| am going to| just)?\s+(?:build|place|create|make|add|construct|spawn|put|erect)|let me build|going to build|building a|placing a|creating a)\b/i.test(t); }
function mentionsDeleting(t){   return /\b(i(?:'ll| will| am going to)?\s+(?:delete|remove|destroy|clear|demolish)|let me delete|going to delete)\b/i.test(t); }
function mentionsMoving(t){     return /\b(i(?:'ll| will| am going to)?\s+(?:move|shift|relocate|slide)|let me move|going to move)\b/i.test(t); }
function mentionsRecoloring(t){ return /\b(i(?:'ll| will| am going to)?\s+(?:recolor|repaint|paint|dye)|let me recolor|going to recolor)\b/i.test(t); }
function mentionsHiding(t){     return /\b(i(?:'ll| will| am going to)?\s+(?:hide|show|reveal|unhide)|let me hide|going to hide)\b/i.test(t); }

function cleanText(t){
  return t
    .replace(/BUILD:\s*\{[^\n\r]+\}/g,'')
    .replace(/DELETE:\s*\{[^\n\r]+\}/g,'')
    .replace(/MOVE:\s*\{[^\n\r]+\}/g,'')
    .replace(/RECOLOR:\s*\{[^\n\r]+\}/g,'')
    .replace(/SPAWN_NPC:\s*\{[^\n\r]+\}/g,'')
    .replace(/NPC_CMD:\s*\{[^\n\r]+\}/g,'')
    .replace(/HIDE:\s*\{[^\n\r]+\}/g,'')
    .replace(/SHOW:\s*\{[^\n\r]+\}/g,'')
    .replace(/SET_COLLIDABLE:\s*\{[^\n\r]+\}/g,'')
    .replace(/DROP_PHYSICS:\s*\{[^\n\r]+\}/g,'')
    .replace(/WORLD_SET:\s*\{[^\n\r]+\}/g,'')
    .replace(/CALVIN_GOTO:\s*\{[^\n\r]+\}/g,'')
    .trim();
}

function handleCommands(raw){
  if(!buildingEnabled) return;
  const builds        = parseAllBuilds(raw);
  const deletes       = parseAllDeletes(raw);
  const moves         = parseAllMoves(raw);
  const recolors      = parseAllRecolors(raw);
  const spawnList     = parseAllSpawnNPCs(raw);
  const npcCmdsArr    = parseAllNPCCmds(raw);
  const hides         = parseAllHides(raw);
  const shows         = parseAllShows(raw);
  const collidables   = parseAllSetCollidable(raw);
  const physDrops     = parseAllDropPhysics(raw);
  const worldSets     = parseAllWorldSet(raw);
  const gotoList      = parseAllCalvinGoto(raw);

  builds.forEach(buildShape);
  deletes.forEach(deleteShape);
  moves.forEach(moveShape);
  recolors.forEach(recolorShape);
  spawnList.forEach(spawnNPC);
  npcCmdsArr.forEach(npcCmdExec);
  hides.forEach(hideShape);
  shows.forEach(showShape);
  collidables.forEach(setCollidable);
  physDrops.forEach(dropPhysics);
  worldSets.forEach(applyWorldSet);
  gotoList.forEach(calvinGoto);

  const events=[];
  if(builds.length)     events.push('placed '+builds.map(b=>b.shape).join(', '));
  if(deletes.length)    events.push('removed shape(s) '+deletes.map(d=>d.id).join(', '));
  if(moves.length)      events.push('moved shape(s) '+moves.map(m=>m.id).join(', '));
  if(recolors.length)   events.push('recolored shape(s) '+recolors.map(r=>r.id).join(', '));
  if(spawnList.length)  events.push('spawned NPC(s): '+spawnList.map(n=>n.name||n.id).join(', '));

  const torusPlaced=builds.some(b=>b.shape==='torus');

  if(events.length){
    const summary=torusPlaced
      ? 'Calvin just placed a TORUS. React with appropriate horror and disgust.'
      : 'Calvin just '+events.join(' and ')+'. React briefly if you feel like it.';
    turnQueue=turnQueue.then(()=>{
      return execIris(summary);
    });
  }
}

// ═══════════════════════════════════════════════════
//  SHAPE OPERATIONS
// ═══════════════════════════════════════════════════
function buildShape(cmd){
  const shape=(cmd.shape||'cube').toLowerCase();
  const colorStr=String(cmd.color||'#aaaaff');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  const color=parseInt(colorHex.replace('#',''),16)||0xaaaaff;
  const s=Array.isArray(cmd.scale)&&cmd.scale.length>=3?cmd.scale.map(Number):[1,1,1];
  const wx=isNaN(cmd.x)?((Math.random()-0.5)*40):Math.max(-58,Math.min(58,+cmd.x));
  const wy=isNaN(cmd.y)?0:Math.max(0,+cmd.y);
  const wz=isNaN(cmd.z)?((Math.random()-0.5)*40):Math.max(-58,Math.min(58,+cmd.z));

  let geo;
  switch(shape){
    case 'sphere':    geo=new THREE.SphereGeometry(0.6*s[0],18,14); break;
    case 'pyramid':   geo=new THREE.ConeGeometry(0.65*s[0],1.4*s[1],4); break;
    case 'torus':     geo=new THREE.TorusGeometry(0.5*s[0],0.2*s[1],12,28); break;
    case 'cylinder':  geo=new THREE.CylinderGeometry(0.5*s[0],0.5*s[0],s[1],16); break;
    case 'rectprism': geo=new THREE.BoxGeometry(s[0]*1.8,s[1],s[2]*1.1); break;
    default:          geo=new THREE.BoxGeometry(s[0],s[1],s[2]);
  }
  geo.computeBoundingBox();
  const halfH=(geo.boundingBox.max.y-geo.boundingBox.min.y)/2;

  let mat;
  if(cmd.texture){
    const c2Str=String(cmd.color2||'');
    const c2Hex=c2Str.startsWith('#')?c2Str:(c2Str?'#'+c2Str:null);
    const tex=makeTexture(cmd.texture,colorHex,c2Hex);
    tex.repeat.set(Math.max(1,Math.round(s[0])),Math.max(1,Math.round(s[1])));
    tex.needsUpdate=true;
    mat=new THREE.MeshPhongMaterial({map:tex,shininess:40});
  } else {
    mat=new THREE.MeshPhongMaterial({color,shininess:55});
  }

  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true; mesh.receiveShadow=true;
  mesh.position.set(wx,halfH+wy,wz);
  mesh.userData.id = (cmd._restoreId!=null) ? Number(cmd._restoreId) : nextObjId++;
  mesh.userData.shape=shape;
  mesh.userData.scale=s;
  mesh.userData.texture=cmd.texture||null;
  mesh.userData.color2=cmd.color2||null;
  mesh.userData.cmdY=wy;
  mesh.userData.label=cmd.label||null;
  mesh.userData.collidable=(cmd.collidable===false)?false:true;
  scene.add(mesh);
  placedObjects.push(mesh);

  mesh.scale.setScalar(0.01);
  const t0=performance.now();
  (function pop(){
    const p=Math.min(1,(performance.now()-t0)/380);
    mesh.scale.setScalar(1-Math.pow(1-p,3));
    if(p<1) requestAnimationFrame(pop);
  })();
  calvinDest.x=wx-1.5; calvinDest.z=wz+0.4;
  debouncedSave();
}

function deleteShape(cmd){
  const idx=placedObjects.findIndex(o=>o.userData.id===+cmd.id);
  if(idx===-1) return;
  const mesh=placedObjects[idx];
  const t0=performance.now();
  (function shrink(){
    const p=Math.min(1,(performance.now()-t0)/300);
    mesh.scale.setScalar(1-p);
    if(p<1){ requestAnimationFrame(shrink); }
    else{ scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
  })();
  placedObjects.splice(idx,1);
  debouncedSave();
}

function moveShape(cmd){
  const mesh=placedObjects.find(o=>o.userData.id===+cmd.id);
  if(!mesh) return;
  const tx=isNaN(cmd.x)?mesh.position.x:Math.max(-58,Math.min(58,+cmd.x));
  const tz=isNaN(cmd.z)?mesh.position.z:Math.max(-58,Math.min(58,+cmd.z));
  const ty=isNaN(cmd.y)?mesh.position.y:Math.max(0,+cmd.y);
  mesh.geometry.computeBoundingBox();
  const halfH=(mesh.geometry.boundingBox.max.y-mesh.geometry.boundingBox.min.y)/2;
  const ox=mesh.position.x,oy=mesh.position.y,oz=mesh.position.z;
  const nx=tx,ny=halfH+ty,nz=tz;
  const t0=performance.now();
  (function slide(){
    const p=Math.min(1,(performance.now()-t0)/500);
    const e=1-Math.pow(1-p,3);
    mesh.position.set(ox+(nx-ox)*e,oy+(ny-oy)*e,oz+(nz-oz)*e);
    if(p<1) requestAnimationFrame(slide);
  })();
  mesh.userData.cmdY=ty;
  calvinDest.x=tx-1.5; calvinDest.z=tz+0.4;
  debouncedSave();
}

function recolorShape(cmd){
  const mesh=placedObjects.find(o=>o.userData.id===+cmd.id);
  if(!mesh) return;
  const colorStr=String(cmd.color||'#ffffff');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  if(cmd.texture){
    const c2Hex=cmd.color2?String(cmd.color2).startsWith('#')?cmd.color2:'#'+cmd.color2:null;
    const tex=makeTexture(cmd.texture,colorHex,c2Hex);
    const s=mesh.userData.scale||[1,1,1];
    tex.repeat.set(Math.max(1,Math.round(s[0])),Math.max(1,Math.round(s[1])));
    tex.needsUpdate=true;
    mesh.material.map=tex;
    mesh.material.color.setHex(0xffffff);
    mesh.material.needsUpdate=true;
    mesh.userData.texture=cmd.texture;
    mesh.userData.color2=cmd.color2||null;
  } else {
    mesh.material.map=null;
    mesh.material.color.setHex(parseInt(colorHex.replace('#',''),16));
    mesh.material.needsUpdate=true;
    mesh.userData.texture=null;
    mesh.userData.color2=null;
  }
  debouncedSave();
}

// ═══════════════════════════════════════════════════
//  PHYSICS OBJECTS
// ═══════════════════════════════════════════════════
const physicsObjects=[]; // {mesh, vel:{x,y,z}, bounciness, radius}
let worldGravity=-14;

function dropPhysics(cmd){
  const shape=(cmd.shape||'sphere').toLowerCase();
  const colorStr=String(cmd.color||'#ff6600');
  const colorHex=colorStr.startsWith('#')?colorStr:'#'+colorStr;
  const color=parseInt(colorHex.replace('#',''),16)||0xff6600;
  const s=Array.isArray(cmd.scale)&&cmd.scale.length>=3?cmd.scale.map(Number):[1,1,1];
  const wx=isNaN(cmd.x)?0:Math.max(-58,Math.min(58,+cmd.x));
  const wy=isNaN(cmd.y)?12:Math.max(0,+cmd.y);
  const wz=isNaN(cmd.z)?0:Math.max(-58,Math.min(58,+cmd.z));
  const bounciness=isNaN(cmd.bounciness)?0.5:Math.max(0,Math.min(0.95,+cmd.bounciness));

  let geo, radius=0.6*s[0];
  switch(shape){
    case 'sphere': geo=new THREE.SphereGeometry(radius,14,10); break;
    case 'cube':   geo=new THREE.BoxGeometry(s[0],s[1],s[2]); radius=Math.min(s[0],s[1],s[2])*0.5; break;
    default:       geo=new THREE.SphereGeometry(radius,14,10);
  }
  const mat=new THREE.MeshPhongMaterial({color,shininess:80,emissive:new THREE.Color(color).multiplyScalar(0.1)});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.castShadow=true;
  mesh.position.set(wx,wy,wz);
  scene.add(mesh);

  physicsObjects.push({
    mesh, bounciness, radius,
    vel:{x:(Math.random()-0.5)*2,y:0,z:(Math.random()-0.5)*2},
    alive:true
  });

  // auto-remove after 30s to keep things clean
  setTimeout(()=>{
    const idx=physicsObjects.findIndex(p=>p.mesh===mesh);
    if(idx!==-1){
      scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose();
      physicsObjects.splice(idx,1);
    }
  },30000);
}

function updatePhysics(dt){
  for(const obj of physicsObjects){
    if(!obj.alive) continue;
    obj.vel.y+=worldGravity*dt;
    obj.mesh.position.x+=obj.vel.x*dt;
    obj.mesh.position.y+=obj.vel.y*dt;
    obj.mesh.position.z+=obj.vel.z*dt;
    // floor bounce
    if(obj.mesh.position.y<obj.radius){
      obj.mesh.position.y=obj.radius;
      obj.vel.y=-obj.vel.y*obj.bounciness;
      obj.vel.x*=0.85; obj.vel.z*=0.85;
    }
    // world boundary
    if(Math.abs(obj.mesh.position.x)>58){ obj.vel.x*=-0.6; obj.mesh.position.x=Math.sign(obj.mesh.position.x)*58; }
    if(Math.abs(obj.mesh.position.z)>58){ obj.vel.z*=-0.6; obj.mesh.position.z=Math.sign(obj.mesh.position.z)*58; }
  }
}

// ═══════════════════════════════════════════════════
//  WORLD SET (sky, ground, gravity)
// ═══════════════════════════════════════════════════
function applyWorldSet(cmd){
  if(cmd.sky){
    const c=new THREE.Color(cmd.sky);
    scene.background=c;
    scene.fog=new THREE.FogExp2(c.getHex(),0.006);
  }
  if(cmd.ground){
    const gc=parseInt(String(cmd.ground).replace('#',''),16);
    floor.material.color.setHex(gc);
  }
  if(!isNaN(cmd.gravity)){
    worldGravity=Math.max(-60,Math.min(0,+cmd.gravity));
  }
  debouncedSave();
}

  if(!t) return 'somewhere else';
  if(/haha|heh|lol|lmao/i.test(t)) return 'amused';
  if(/\?/.test(t)) return 'curious';
  if(/!/.test(t)) return 'excited';
  if(/weird|strange|odd|wait/i.test(t)) return 'confused';
  return 'vibing';
}

//  TARGET DETECTION
// ═══════════════════════════════════════════════════
function detectTarget(msg){
  const lo=msg.toLowerCase();
  const calvinHit=/\bcalvin\b/.test(lo);
  const irisHit=/\biris\b/.test(lo);
  if(calvinHit&&!irisHit) return 'calvin';
  if(irisHit&&!calvinHit) return 'iris';
  return 'both';
}

function sendMsg(){
  const txt=document.getElementById('msginput').value.trim();
  if(!txt&&!pendingImageData) return;
  let userMsg=txt||'Look at this image!';
  let prefix='';
  if(pendingImageData){
    prefix='[An image was shown to you] ';
    pendingImageData=null;
    document.getElementById('imgpreview').style.display='none';
    document.getElementById('imginput').value='';
  }
  document.getElementById('msginput').value='';
  scheduleAutoConvo();

  const sender=guestSenderName();
  const senderTag=currentUser!=='host'?sender+' (a guest character in the world)':'a visitor';

  // Show the guest\'s message in their own bubble
  if(currentUser!=='host') showGuestBubble(currentUser, userMsg);

  const target=detectTarget(userMsg);
  if(target==='calvin'){
    queueConvo('calvin',prefix+senderTag+' says to you specifically (not Iris): "'+userMsg+'" — respond, 1-2 sentences max.',2);
  } else if(target==='iris'){
    queueConvo('iris',prefix+senderTag+' says to you specifically (not Calvin): "'+userMsg+'" — respond.',2);
  } else {
    queueConvo('calvin',prefix+senderTag+' says: "'+userMsg+'" — respond to them, 1-2 sentences.',4);
  }
}

(()=>{

  for(let i=0;i<900;i++){
    const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=150+Math.random()*50;
    v.push(r*Math.sin(p)*Math.cos(t),Math.abs(r*Math.cos(p))+10,r*Math.sin(p)*Math.sin(t));
  }
  g.setAttribute('position',new THREE.Float32BufferAttribute(v,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:0.25,transparent:true,opacity:0.5})));
})();

function addEyes(parent,faceZ,eyeColor){
  const em=new THREE.MeshPhongMaterial({color:0xffffff,emissive:eyeColor,shininess:120});
  const pm=new THREE.MeshPhongMaterial({color:0x0a0a0a});
  [-0.3,0.3].forEach(x=>{
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.11,8,8),em);
    eye.position.set(x,0.2,faceZ);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.055,6,6),pm);
    pupil.position.z=0.085; eye.add(pupil); parent.add(eye);
  });
}

// Zinnx eyes: offset Y levels, positioned on angled face

// Legs: two rectprisms connecting torus bottom to ground
const legMat=new THREE.MeshPhongMaterial({color:0x1144cc,emissive:0x04082a,shininess:50});
[-0.55,0.55].forEach(lx=>{

const guestMeshes = { zinnx: zinnxGroup, voonz: voonzGroup, nazzle: nazzleGroup };
const guestPos    = {
  zinnx:  {x:3,  y:0, z:-3,  dest:{x:3,  z:-3},  angle:0, elapsed:0},
  voonz:  {x:-4, y:0, z:4,   dest:{x:-4, z:4},   angle:0, elapsed:0},
  nazzle: {x:0,  y:0, z:-5,  dest:{x:0,  z:-5},  angle:0, elapsed:0}
};

function activateGuest(guestId){
  const mesh=guestMeshes[guestId];
  if(!mesh) return;
  mesh.visible=true;
  // Drop-in animation from above
  const gp=guestPos[guestId];
  mesh.position.set(gp.x,16,gp.z);
  const t0=performance.now();
  (function fall(){
    const p=Math.min(1,(performance.now()-t0)/900);
    const e=1-Math.pow(1-p,3);
    const groundY=guestId==='voonz'?2.5:(guestId==='nazzle'?1.5:1.1);
    mesh.position.y=16+(groundY-16)*e;
    if(p<1) requestAnimationFrame(fall);
    else{ gp.y=groundY; }
  })();
}

function updateGuests(dt){
  for(const id in guestMeshes){
    const mesh=guestMeshes[id];
    if(!mesh.visible) continue;
    const gp=guestPos[id];
    gp.elapsed+=dt;

    if(id==='voonz'){
      // Float and bob, no ground movement needed
      gp.y=2.5+Math.sin(gp.elapsed*1.1)*0.4;
      mesh.position.y=gp.y;
      mesh.rotation.y+=dt*0.4;
    } else if(id==='nazzle'){
      // Waddle on legs
      const dx=gp.dest.x-gp.x, dz=gp.dest.z-gp.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>0.1){
        const sp=1.8*dt;
        gp.x+=dx/dist*Math.min(sp,dist);
        gp.z+=dz/dist*Math.min(sp,dist);
        gp.angle=Math.atan2(dx,dz);
      }
      mesh.position.set(gp.x,1.5+Math.abs(Math.sin(gp.elapsed*3))*0.06,gp.z);
      mesh.rotation.y=gp.angle;
    } else if(id==='zinnx'){
      // Walk like Calvin
      const dx=gp.dest.x-gp.x, dz=gp.dest.z-gp.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist>0.1){
        const sp=2.5*dt;
        gp.x+=dx/dist*Math.min(sp,dist);
        gp.z+=dz/dist*Math.min(sp,dist);
        gp.angle=Math.atan2(dx,dz);
      }
      const moving=dist>0.1;
      mesh.position.set(gp.x,1.1+(moving?Math.abs(Math.sin(gp.elapsed*8))*0.07:Math.sin(gp.elapsed*1.2)*0.03),gp.z);
      mesh.rotation.y=gp.angle;
    }
  }
}


const calvinPos={x:-3,y:0,z:0}, calvinDest={x:-3,z:0};
let calvinAngle=0;
const irisPos={x:4,y:4,z:1};

canvas.addEventListener('mousedown',e=>{mouse.down=true;mouse.btn=e.button;mouse.lx=e.clientX;mouse.ly=e.clientY;mouseMoved=false;});
canvas.addEventListener('mousemove',e=>{
  if(!mouse.down)return; mouseMoved=true;
  const dx=e.clientX-mouse.lx, dy=e.clientY-mouse.ly;
  if(mouse.btn===2){cam.theta-=dx*0.006;cam.phi=Math.max(0.06,Math.min(1.4,cam.phi-dy*0.005));}
  else if(mouse.btn===0){cam.px-=dx*0.05;cam.py=Math.max(-4,Math.min(22,cam.py+dy*0.05));}
  mouse.lx=e.clientX; mouse.ly=e.clientY;
});
canvas.addEventListener('mouseup',e=>{
  if(!mouseMoved&&e.button===0){
    const rect=canvas.getBoundingClientRect();
    const rc=new THREE.Raycaster();
    rc.setFromCamera(
      new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1),
      mainCam
    );
    const hits=rc.intersectObjects(scene.children,true);
    if(hits.length){
      let o=hits[0].object;
      while(o.parent&&o.parent!==scene) o=o.parent;
      if(o.name==='calvin') document.getElementById('calvin-panel').classList.toggle('visible');
      else if(o.name==='iris') document.getElementById('iris-panel').classList.toggle('visible');
    }
  }
  mouse.down=false;
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('wheel',e=>{cam.dist=Math.max(5,Math.min(130,cam.dist+e.deltaY*0.07));},{passive:true});
function resize(){
  renderer.setSize(window.innerWidth,window.innerHeight);
  mainCam.aspect=window.innerWidth/window.innerHeight;
  mainCam.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

// ═══════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════
let lastTime=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(), dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  if(!paused){
    elapsed+=dt;
    mainCam.position.set(
      cam.px+cam.dist*Math.sin(cam.theta)*Math.cos(cam.phi),
      cam.py+cam.dist*Math.sin(cam.phi),
      cam.dist*Math.cos(cam.theta)*Math.cos(cam.phi)
    );
    mainCam.lookAt(cam.px,Math.max(0,cam.py-3),0);

    const cdx=calvinDest.x-calvinPos.x, cdz=calvinDest.z-calvinPos.z;
    const cdist=Math.sqrt(cdx*cdx+cdz*cdz);
    if(cdist>0.04){
      const sp=3*dt;
      calvinPos.x+=cdx/cdist*Math.min(sp,cdist);
      calvinPos.z+=cdz/cdist*Math.min(sp,cdist);
      calvinAngle=Math.atan2(cdx,cdz);
    }
    const moving=cdist>0.06;
    calvinPos.y=1.25+(moving?Math.abs(Math.sin(elapsed*8))*0.08:Math.sin(elapsed*1.2)*0.03);
    calvinMesh.position.set(calvinPos.x,calvinPos.y,calvinPos.z);
    calvinMesh.rotation.y=calvinAngle;
    calvinMesh.rotation.z=moving?Math.sin(elapsed*8)*0.06:Math.sin(elapsed*0.8)*0.015;

    const orbitR=5+Math.sin(elapsed*0.22)*1.8;
    irisPos.x+=(calvinPos.x+Math.sin(elapsed*0.38)*orbitR-irisPos.x)*Math.min(1,dt*1.2);
    irisPos.z+=(calvinPos.z+Math.cos(elapsed*0.38)*orbitR-irisPos.z)*Math.min(1,dt*1.2);
    irisPos.y+=(3.6+Math.sin(elapsed*0.9)*0.9-irisPos.y)*Math.min(1,dt*2);
    irisMesh.position.set(irisPos.x,irisPos.y,irisPos.z);
    irisMesh.rotation.y+=dt*0.5;
    irisMesh.rotation.x=Math.sin(elapsed*0.45)*0.2;
    irisMesh.rotation.z=Math.cos(elapsed*0.38)*0.16;

    calvinGlow.intensity=0.5+Math.sin(elapsed*2)*0.18;
    irisGlow.intensity=0.5+Math.sin(elapsed*2.4+1)*0.18;

    updateNPCs(dt);
    updatePhysics(dt);
    updateGuests(dt);
  }
  renderer.setViewport(0,0,window.innerWidth,window.innerHeight);
  renderer.setScissorTest(false);
  renderer.render(scene,mainCam);
  calvinMR.render(scene,calvinPOV);
  irisMR.render(scene,irisPOV);
}

// ═══════════════════════════════════════════════════
//  STARTUP
// ═══════════════════════════════════════════════════
async function startup(){
  const fill=document.getElementById('lfill');
  fill.style.width='30%';
  await wait(300);
  document.getElementById('lmsg').textContent='Connecting to Firebase...';
  fill.style.width='55%';

  try{
    currentSlot = await getActiveSave();
    document.getElementById('lmsg').textContent='Loading world...';
    fill.style.width='75%';
    const saveData = await loadSlot(currentSlot);
    fill.style.width='95%';
    await wait(200);

    document.getElementById('lmsg').textContent='Waking up Calvin and Iris...';
    fill.style.width='100%';
    await wait(280);
    document.getElementById('loading').style.display='none';

    calvinMesh.position.set(-3,1.25,0);
    irisMesh.position.set(4,4,1);
    calvinPos.x=-3; calvinPos.z=0;
    irisPos.x=4; irisPos.y=4; irisPos.z=1;

    animate();

    // Activate guest mesh if a guest is logged in
    if(currentUser!=='host') activateGuest(currentUser);

    if(saveData && (saveData.objects?.length || saveData.npcData?.length)){
      restoreWorld(saveData);
      const guestArrival=currentUser!=='host'
        ? ' Also, '+GUEST_NAMES[currentUser]+' just dropped into the world. React briefly.'
        : '';
      queueConvo('calvin',
        'You just woke back up. The world has stuff in it from last time. Say hi to Iris and make a quick comment about what you see. 1-2 sentences.'+guestArrival,
        2
      );
    } else {
      const guestIntro=currentUser!=='host'
        ? ' Also, '+GUEST_NAMES[currentUser]+' just dropped into the world! React to their arrival briefly.'
        : '';
      queueConvo('calvin',
        'You just woke up in this 3D world for the first time. Say hi to Iris and introduce yourself. Keep it short and goofy. Do NOT build anything.'+guestIntro,
        2
      );
    }

    turnQueue=turnQueue.then(()=>{ scheduleAutoConvo(); });
    scheduleNPCTalk();

  }catch(e){
    console.error('Startup error:',e);
    document.getElementById('loading').style.display='none';
    animate();
    if(currentUser!=='host') activateGuest(currentUser);
    queueConvo('calvin','You just woke up. Say hi to Iris briefly.',2);
    scheduleAutoConvo();
    scheduleNPCTalk();
  }
}
