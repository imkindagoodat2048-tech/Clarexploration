<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calvin & Iris</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a14; color:#e8e4f0; font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; height:100vh; }
#c { display:block; position:fixed; inset:0; }

#topbar {
  position:fixed; top:0; left:0; right:0; height:50px;
  background:rgba(8,8,18,0.92); backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; padding:0 14px; gap:8px; z-index:200;
}
.title { font-size:15px; font-weight:700; color:#b8a8ff; margin-right:6px; letter-spacing:0.02em; }
.sep { width:1px; height:22px; background:rgba(255,255,255,0.1); margin:0 4px; }
.btn {
  padding:5px 11px; border-radius:6px; border:1px solid rgba(255,255,255,0.13);
  background:rgba(255,255,255,0.04); color:#bbb; font-size:12px; cursor:pointer;
  transition:all 0.15s; user-select:none;
}
.btn:hover { background:rgba(255,255,255,0.1); color:#fff; }
.btn.on { background:rgba(255,100,100,0.18); border-color:rgba(255,100,100,0.35); color:#ffaaaa; }
#stopbtn { background:rgba(255,150,60,0.14); border-color:rgba(255,150,60,0.3); color:#ffcc88; }
#stopbtn:hover { background:rgba(255,150,60,0.28); }
#stopbtn.on { background:rgba(80,200,80,0.14); border-color:rgba(80,200,80,0.3); color:#88ffaa; }
#statustext { font-size:11px; color:#555; margin-left:auto; }

#bottom {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  padding:10px 14px; background:rgba(8,8,18,0.92); backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,0.07);
  display:flex; gap:8px; align-items:center;
}
#imgbtn {
  padding:7px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.13);
  background:rgba(255,255,255,0.05); color:#aaa; font-size:12px; cursor:pointer;
  white-space:nowrap; transition:all 0.15s;
}
#imgbtn:hover { background:rgba(255,255,255,0.1); color:#fff; }
#imginput { display:none; }
#imgpreview {
  width:36px; height:36px; border-radius:6px; object-fit:cover;
  border:1px solid rgba(255,255,255,0.2); display:none;
}
#msginput {
  flex:1; padding:8px 12px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.13); background:rgba(255,255,255,0.06);
  color:#eee; font-size:13px; outline:none;
}
#msginput::placeholder { color:#555; }
#msginput:focus { border-color:rgba(180,160,255,0.4); background:rgba(255,255,255,0.08); }
#sendbtn {
  padding:8px 16px; border-radius:8px; border:none;
  background:linear-gradient(135deg,#5a3fbc,#8050f0); color:#fff;
  font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s;
}
#sendbtn:hover { filter:brightness(1.15); }

.char-panel {
  position:fixed; bottom:72px; z-index:200;
  width:230px; background:rgba(8,8,20,0.95); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.09); border-radius:12px;
  padding:14px; display:none;
  animation:fadeup 0.2s ease;
}
@keyframes fadeup { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.char-panel.visible { display:block; }
#calvin-panel { left:14px; border-top:2px solid #7755dd; }
#iris-panel { right:14px; border-top:2px solid #40b8f0; }
.panel-name { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:10px; }
#calvin-panel .panel-name { color:#9870ff; }
#iris-panel .panel-name { color:#50d0ff; }
.panel-row { font-size:12px; margin-bottom:5px; }
.panel-row .lbl { color:#555; }
.panel-row .val { color:#ccc; font-weight:500; }
.panel-thought { font-size:12px; color:#999; line-height:1.5; margin:8px 0; font-style:italic; min-height:36px; }
.panel-cam-wrap {
  width:100%; height:76px; border-radius:7px; overflow:hidden;
  border:1px solid rgba(255,255,255,0.08); background:#050510;
}
.panel-cam-wrap canvas { width:100%!important; height:100%!important; display:block; }
.panel-close {
  position:absolute; top:8px; right:10px; font-size:14px; color:#444;
  cursor:pointer; line-height:1;
}
.panel-close:hover { color:#aaa; }

.bubble {
  position:fixed; z-index:150; pointer-events:none;
  background:rgba(12,12,28,0.96); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.09); border-radius:10px;
  padding:8px 12px; max-width:210px; font-size:12px; line-height:1.6;
  color:#ccc; opacity:0; transition:opacity 0.3s; word-wrap:break-word;
}
.bubble.show { opacity:1; }
#calvin-bubble { border-left:2px solid #7755dd; left:14px; bottom:140px; }
#iris-bubble { border-left:2px solid #40b8f0; right:14px; bottom:140px; }

#hint {
  position:fixed; bottom:72px; left:50%; transform:translateX(-50%);
  font-size:11px; color:#333; pointer-events:none; z-index:100;
  text-align:center; white-space:nowrap;
}

#loading {
  position:fixed; inset:0; z-index:999; background:#0a0a14;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
}
.load-logo { font-size:30px; font-weight:800; color:#b0a0ff; letter-spacing:0.05em; }
.load-sub { font-size:13px; color:#555; }
#loadbar { width:180px; height:2px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
#loadfill { height:100%; width:0%; background:linear-gradient(90deg,#5a3fbc,#8050f0); border-radius:2px; transition:width 0.5s; }
</style>
</head>
<body>

<div id="loading">
  <div class="load-logo">Calvin &amp; Iris</div>
  <div class="load-sub" id="loadmsg">Building the world...</div>
  <div id="loadbar"><div id="loadfill"></div></div>
</div>

<canvas id="c"></canvas>

<div id="topbar">
  <span class="title">Calvin &amp; Iris</span>
  <div class="sep"></div>
  <button class="btn" id="stopbtn" onclick="toggleBuilding()">Stop Building</button>
  <button class="btn" id="pausebtn" onclick="togglePause()">Pause</button>
  <button class="btn" id="mutebtn" onclick="toggleMute()">Mute</button>
  <button class="btn" id="hidebtn" onclick="toggleIris()">Hide Iris</button>
  <span id="statustext"></span>
</div>

<div id="calvin-panel" class="char-panel">
  <span class="panel-close" onclick="document.getElementById('calvin-panel').classList.remove('visible')">✕</span>
  <div class="panel-name">Calvin — Rectangular Prism</div>
  <div class="panel-row"><span class="lbl">Mood: </span><span class="val" id="calvin-mood">curious</span></div>
  <div class="panel-thought" id="calvin-thought">Waking up...</div>
  <div class="panel-cam-wrap"><canvas id="calvin-cam"></canvas></div>
</div>

<div id="iris-panel" class="char-panel">
  <span class="panel-close" onclick="document.getElementById('iris-panel').classList.remove('visible')">✕</span>
  <div class="panel-name">Iris — Floating Cube</div>
  <div class="panel-row"><span class="lbl">Mood: </span><span class="val" id="iris-mood">playful</span></div>
  <div class="panel-thought" id="iris-thought">Floating around...</div>
  <div class="panel-cam-wrap"><canvas id="iris-cam"></canvas></div>
</div>

<div class="bubble" id="calvin-bubble"></div>
<div class="bubble" id="iris-bubble"></div>

<div id="hint">M1: pan &nbsp;|&nbsp; M2: rotate &nbsp;|&nbsp; Scroll: zoom &nbsp;|&nbsp; Click Calvin or Iris to inspect</div>

<div id="bottom">
  <button id="imgbtn" onclick="document.getElementById('imginput').click()">&#128247; Image</button>
  <input type="file" id="imginput" accept="image/*" onchange="handleImage(event)">
  <img id="imgpreview" src="" alt="preview">
  <input type="text" id="msginput" placeholder="Say something to Calvin and Iris..." onkeydown="if(event.key==='Enter')sendMsg()">
  <button id="sendbtn" onclick="sendMsg()">Send</button>
</div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────
const CALVIN_KEY = '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';
const IRIS_KEY   = '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';
const GROQ_URL   = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL      = 'meta-llama/llama-4-scout-17b-16e-instruct';

const CALVIN_SYS = `You are Calvin, an enthusiastic rectangular prism living in a colorful 3D world.
Iris is your best friend, a floating cube. You LOVE building and creating things.
BE FAMILY-FRIENDLY AT ALL TIMES. Keep replies SHORT (1-2 sentences max).
When you want to build something, add a BUILD command at the END of your message:
BUILD:{"shape":"cube","color":"#ff6644","position":{"x":2,"y":0,"z":-3},"scale":[1,1,1]}
Available shapes: sphere, pyramid, torus, cube, rectprism
Color: any hex. Position x and z: -12 to 12. y: always 0. Scale: [w,h,d] floats.
For rectprism you can make wide/flat/tall shapes with scale.
Not every reply needs BUILD — only when you genuinely want to create something new!`;

const IRIS_SYS = `You are Iris, a witty floating cube and Calvin's best friend in a 3D world.
You don't build things yourself — you watch Calvin work and crack jokes or cheer him on.
BE FAMILY-FRIENDLY AT ALL TIMES. Short replies only (1-2 sentences). Be charming and funny.
Don't announce that you're joking — just naturally be amusing. Ask some questions occasionally, and dont be afraid to be a little bit rude, as long as its comedic and satire, AND FAMILY FRIENDLY.`;

// ── STATE ─────────────────────────────────────────────────────────────
let paused = false, muted = false, irisHidden = false, buildingEnabled = true;
let calvinHist = [], irisHist = [];
let pendingImageData = null;
let aiLock = false;
let autoTimer = 0;
let mouseMoved = false;
let mouse = { down:false, btn:0, lx:0, ly:0 };
let camState = { theta:0.3, phi:0.4, dist:28, panX:0, panY:2 };
let bubTimers = {};
const placedObjects = [];
const calvinTarget = new THREE.Vector3(-3, 0, 0);

// ── THREE.JS SCENE ────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080810);
scene.fog = new THREE.FogExp2(0x080810, 0.018);

const camera = new THREE.PerspectiveCamera(58, 1, 0.1, 300);

// ── LIGHTING ──────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1040, 1.2));

const sun = new THREE.DirectionalLight(0xfff0e0, 1.4);
sun.position.set(12, 22, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1; sun.shadow.camera.far = 80;
[-25,25].forEach(v => { sun.shadow.camera.left = sun.shadow.camera.bottom = -25; sun.shadow.camera.right = sun.shadow.camera.top = 25; });
scene.add(sun);

const fillLight = new THREE.PointLight(0x5030cc, 0.7, 60);
fillLight.position.set(-10, 8, -6);
scene.add(fillLight);

const rimLight = new THREE.PointLight(0x0088ff, 0.4, 50);
rimLight.position.set(10, 6, -10);
scene.add(rimLight);

// ── FLOOR ──────────────────────────────────────────────────────────────
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshLambertMaterial({ color: 0x0d0d1e })
);
floorMesh.rotation.x = -Math.PI/2;
floorMesh.receiveShadow = true;
scene.add(floorMesh);
scene.add(new THREE.GridHelper(100, 50, 0x151530, 0x0f0f28));

// Stars
(function addStars() {
  const geo = new THREE.BufferGeometry();
  const pos = [];
  for(let i=0; i<600; i++) {
    const theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
    const r = 80 + Math.random()*30;
    pos.push(r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi)*0.5+20, r*Math.sin(phi)*Math.sin(theta));
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color:0xffffff, size:0.25, transparent:true, opacity:0.7 })));
})();

// ── CHARACTERS ────────────────────────────────────────────────────────
function makeEye(parent, x, y, z, glowColor) {
  const eyeM = new THREE.MeshPhongMaterial({ color:0xffffff, emissive:glowColor, shininess:100 });
  const pupilM = new THREE.MeshPhongMaterial({ color:0x111111 });
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.13,8,8), eyeM);
  eye.position.set(x,y,z);
  const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.065,6,6), pupilM);
  pupil.position.z = 0.1;
  eye.add(pupil);
  parent.add(eye);
  return eye;
}

// Calvin
const calvinMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1.8, 2.6, 1.3),
  new THREE.MeshPhongMaterial({ color:0x7744cc, emissive:0x1a0a40, shininess:70 })
);
calvinMesh.position.set(-3, 1.3, 0);
calvinMesh.castShadow = true;
calvinMesh.name = 'calvin';
scene.add(calvinMesh);
makeEye(calvinMesh, -0.38, 0.35, 0.67, 0x9966ff);
makeEye(calvinMesh, 0.38, 0.35, 0.67, 0x9966ff);
const calvinGlow = new THREE.PointLight(0x7744cc, 0.6, 7);
calvinMesh.add(calvinGlow);

// Iris
const irisMesh = new THREE.Mesh(
  new THREE.BoxGeometry(1.4, 1.4, 1.4),
  new THREE.MeshPhongMaterial({ color:0x30b0f0, emissive:0x082840, shininess:100 })
);
irisMesh.position.set(4, 4, 1);
irisMesh.castShadow = true;
irisMesh.name = 'iris';
scene.add(irisMesh);
makeEye(irisMesh, -0.3, 0.1, 0.72, 0x00eeff);
makeEye(irisMesh, 0.3, 0.1, 0.72, 0x00eeff);
const irisGlow = new THREE.PointLight(0x30b0f0, 0.6, 7);
irisMesh.add(irisGlow);

// ── MINI POV CAMERAS ──────────────────────────────────────────────────
const calvinCam = new THREE.PerspectiveCamera(75, 202/76, 0.1, 200);
calvinCam.position.set(0, 0.4, 0.68);
calvinCam.rotation.set(0, 0, 0);
calvinMesh.add(calvinCam);

const irisCam = new THREE.PerspectiveCamera(75, 202/76, 0.1, 200);
irisCam.position.set(0, 0, 0.75);
irisMesh.add(irisCam);

const calvinMiniR = new THREE.WebGLRenderer({ canvas: document.getElementById('calvin-cam'), antialias:false });
calvinMiniR.setSize(202, 76);
calvinMiniR.shadowMap.enabled = false;

const irisMiniR = new THREE.WebGLRenderer({ canvas: document.getElementById('iris-cam'), antialias:false });
irisMiniR.setSize(202, 76);
irisMiniR.shadowMap.enabled = false;

// ── SHAPE FACTORY ─────────────────────────────────────────────────────
function buildShape(cmd) {
  const { shape, color, position, scale } = cmd;
  const s = scale || [1,1,1];
  const c = typeof color === 'string' ? parseInt(color.replace('#','0x')) : 0xffffff;

  let geo;
  switch((shape||'cube').toLowerCase()) {
    case 'sphere':    geo = new THREE.SphereGeometry(0.65*s[0], 18, 14); break;
    case 'pyramid':   geo = new THREE.ConeGeometry(0.7*s[0], 1.5*s[1], 4); break;
    case 'torus':     geo = new THREE.TorusGeometry(0.55*s[0], 0.22*s[1], 12, 28); break;
    case 'rectprism': geo = new THREE.BoxGeometry(s[0]*1.9, s[1]*0.9, s[2]*1.3); break;
    default:          geo = new THREE.BoxGeometry(s[0], s[1], s[2]);
  }

  const mat = new THREE.MeshPhongMaterial({ color:c, shininess:60 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true; mesh.receiveShadow = true;

  geo.computeBoundingBox();
  const h = geo.boundingBox.max.y - geo.boundingBox.min.y;
  const px = Math.max(-12, Math.min(12, position?.x || (Math.random()-0.5)*20));
  const pz = Math.max(-12, Math.min(12, position?.z || (Math.random()-0.5)*20));
  mesh.position.set(px, h/2, pz);
  scene.add(mesh);
  placedObjects.push(mesh);

  // Animate in
  mesh.scale.set(0.01,0.01,0.01);
  const t0 = performance.now();
  (function pop() {
    const p = Math.min(1, (performance.now()-t0)/350);
    const e = 1-(1-p)*(1-p)*(1-p);
    mesh.scale.setScalar(e);
    if(p<1) requestAnimationFrame(pop);
  })();

  // Move Calvin toward it
  calvinTarget.set(px - 1.8, 0, pz + 0.5);
}

// ── AI CALLS ──────────────────────────────────────────────────────────
function setStatus(t) { document.getElementById('statustext').textContent = t; }

async function callGroq(key, sysPrompt, hist) {
  const messages = [{ role:'system', content:sysPrompt }, ...hist];
  const res = await fetch(GROQ_URL, {
    method:'POST',
    headers:{ 'Authorization':'Bearer '+key, 'Content-Type':'application/json' },
    body: JSON.stringify({ model:MODEL, messages, max_tokens:200, temperature:0.88 })
  });
  if(!res.ok) throw new Error('API '+res.status);
  const d = await res.json();
  return d.choices?.[0]?.message?.content?.trim() || '';
}

function parseBuild(text) {
  const m = text.match(/BUILD:\s*(\{[\s\S]*?\})/);
  if(!m) return null;
  try { return JSON.parse(m[1]); } catch(e){ return null; }
}
function cleanText(text) { return text.replace(/BUILD:\s*\{[\s\S]*?\}/g,'').trim(); }

function showBubble(who, text) {
  if(muted) return;
  const el = document.getElementById(who+'-bubble');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(bubTimers[who]);
  bubTimers[who] = setTimeout(()=>el.classList.remove('show'), 6000);
}

function updateMood(who, text) {
  const hasExclaim = text.includes('!');
  const hasFun = /haha|lol|wow|whoa|cool/i.test(text);
  const hasQ = text.includes('?');
  let mood = 'calm';
  if(hasExclaim && hasFun) mood = 'excited';
  else if(hasFun) mood = 'amused';
  else if(hasExclaim) mood = 'eager';
  else if(hasQ) mood = 'curious';
  document.getElementById(who+'-mood').textContent = mood;
}

async function calvinSpeak(trigger) {
  if(paused || aiLock) return;
  aiLock = true;
  setStatus('Calvin is thinking...');
  calvinHist.push({ role:'user', content: trigger });
  if(calvinHist.length > 16) calvinHist = calvinHist.slice(-16);
  try {
    const raw = await callGroq(CALVIN_KEY, CALVIN_SYS, calvinHist);
    calvinHist.push({ role:'assistant', content:raw });
    const text = cleanText(raw);
    const build = parseBuild(raw);
    document.getElementById('calvin-thought').textContent = text || '...';
    updateMood('calvin', text);
    showBubble('calvin', text);
    setStatus('');
    if(build && buildingEnabled) {
      buildShape(build);
      setTimeout(() => irisReact('Calvin just placed a ' + (build.shape||'shape') + '! React to it.'), 800);
    }
  } catch(e) {
    setStatus('(Calvin is quiet)');
    console.error(e);
  }
  aiLock = false;
}

async function irisReact(trigger) {
  if(paused || irisHidden) return;
  irisHist.push({ role:'user', content:trigger });
  if(irisHist.length > 16) irisHist = irisHist.slice(-16);
  try {
    const raw = await callGroq(IRIS_KEY, IRIS_SYS, irisHist);
    irisHist.push({ role:'assistant', content:raw });
    document.getElementById('iris-thought').textContent = raw || '...';
    updateMood('iris', raw);
    showBubble('iris', raw);
  } catch(e) { console.error(e); }
}

// ── CONTROLS ──────────────────────────────────────────────────────────
function toggleBuilding() {
  buildingEnabled = !buildingEnabled;
  const b = document.getElementById('stopbtn');
  b.textContent = buildingEnabled ? 'Stop Building' : 'Start Building';
  b.classList.toggle('on', !buildingEnabled);
}
function togglePause() {
  paused = !paused;
  const b = document.getElementById('pausebtn');
  b.textContent = paused ? 'Resume' : 'Pause';
  b.classList.toggle('on', paused);
}
function toggleMute() {
  muted = !muted;
  document.getElementById('mutebtn').classList.toggle('on', muted);
  if(muted) { ['calvin','iris'].forEach(w=>document.getElementById(w+'-bubble').classList.remove('show')); }
}
function toggleIris() {
  irisHidden = !irisHidden;
  irisMesh.visible = !irisHidden;
  const b = document.getElementById('hidebtn');
  b.textContent = irisHidden ? 'Show Iris' : 'Hide Iris';
  b.classList.toggle('on', irisHidden);
  if(!irisHidden) calvinSpeak('Iris just reappeared! Say something to her.');
  else calvinSpeak('Iris just vanished! React to that.');
}

function handleImage(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImageData = ev.target.result;
    const prev = document.getElementById('imgpreview');
    prev.src = pendingImageData; prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function sendMsg() {
  const txt = document.getElementById('msginput').value.trim();
  if(!txt && !pendingImageData) return;
  let prompt = txt || 'Look at this image!';
  if(pendingImageData) {
    prompt = `[An image was shown to you] ${txt || 'Check this out! Maybe it inspires something to build?'}`;
    pendingImageData = null;
    document.getElementById('imgpreview').style.display = 'none';
    document.getElementById('imginput').value = '';
  }
  document.getElementById('msginput').value = '';
  calvinSpeak(prompt);
  setTimeout(()=>irisReact('The user said: "'+prompt+'" — react to that too!'), 1500);
}

// ── CAMERA CONTROL ────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  mouse.down=true; mouse.btn=e.button; mouse.lx=e.clientX; mouse.ly=e.clientY; mouseMoved=false;
});
canvas.addEventListener('mousemove', e => {
  if(!mouse.down) return;
  mouseMoved = true;
  const dx=e.clientX-mouse.lx, dy=e.clientY-mouse.ly;
  if(mouse.btn===2) {
    camState.theta -= dx*0.006;
    camState.phi = Math.max(0.08, Math.min(1.35, camState.phi - dy*0.005));
  } else if(mouse.btn===0) {
    camState.panX -= dx*0.05;
    camState.panY = Math.max(-4, Math.min(20, camState.panY + dy*0.05));
  }
  mouse.lx=e.clientX; mouse.ly=e.clientY;
});
canvas.addEventListener('mouseup', e => {
  if(!mouseMoved && e.button===0) {
    const rect = canvas.getBoundingClientRect();
    const rc = new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(
      ((e.clientX-rect.left)/rect.width)*2-1,
      -((e.clientY-rect.top)/rect.height)*2+1
    ), camera);
    const hits = rc.intersectObjects(scene.children, true);
    if(hits.length) {
      let obj = hits[0].object;
      while(obj.parent && obj.parent !== scene) obj = obj.parent;
      if(obj.name==='calvin') document.getElementById('calvin-panel').classList.toggle('visible');
      else if(obj.name==='iris') document.getElementById('iris-panel').classList.toggle('visible');
    }
  }
  mouse.down = false;
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
canvas.addEventListener('wheel', e=>{
  camState.dist = Math.max(5, Math.min(90, camState.dist + e.deltaY*0.06));
}, {passive:true});

// ── RESIZE ────────────────────────────────────────────────────────────
function resize() {
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
window.addEventListener('resize',resize); resize();

// ── ANIMATION ─────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  if(paused) return;
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // Camera
  const cp = camState;
  camera.position.set(
    cp.panX + cp.dist * Math.sin(cp.theta) * Math.cos(cp.phi),
    cp.panY + cp.dist * Math.sin(cp.phi),
    cp.dist * Math.cos(cp.theta) * Math.cos(cp.phi)
  );
  camera.lookAt(cp.panX, Math.max(0, cp.panY - 3), 0);

  // Calvin moves toward target
  const cp2 = calvinMesh.position;
  cp2.x += (calvinTarget.x - cp2.x) * dt * 1.8;
  cp2.z += (calvinTarget.z - cp2.z) * dt * 1.8;
  cp2.y = 1.3 + Math.sin(t*1.4)*0.04;
  const dx = calvinTarget.x - cp2.x, dz = calvinTarget.z - cp2.z;
  if(Math.abs(dx)+Math.abs(dz) > 0.05) calvinMesh.rotation.y = Math.atan2(dx, dz);

  // Iris floats & orbits
  const orbitR = 5.5 + Math.sin(t*0.18)*2;
  const ix = calvinMesh.position.x + Math.sin(t*0.32)*orbitR;
  const iz = calvinMesh.position.z + Math.cos(t*0.32)*orbitR;
  irisMesh.position.x += (ix - irisMesh.position.x)*dt*0.7;
  irisMesh.position.z += (iz - irisMesh.position.z)*dt*0.7;
  irisMesh.position.y = 3.8 + Math.sin(t*0.75)*0.8;
  irisMesh.rotation.x = Math.sin(t*0.4)*0.22;
  irisMesh.rotation.y += dt*0.45;
  irisMesh.rotation.z = Math.cos(t*0.35)*0.18;

  // Glows pulse
  calvinGlow.intensity = 0.45 + Math.sin(t*1.8)*0.15;
  irisGlow.intensity = 0.45 + Math.sin(t*2.1+1)*0.15;

  // Subtle wobble on placed objects
  placedObjects.forEach((o,i) => { o.rotation.y += dt*0.12*(i%2?1:-1); });

  // Auto-conversation
  autoTimer += dt;
  if(autoTimer > 20 && !aiLock) {
    autoTimer = 0;
    const prompts = [
      'You feel inspired! Build something creative and tell Iris about it.',
      'Look around your world. Comment on it and maybe add something new.',
      'You have a fun idea. Build something and explain your vision!',
      'Say something to Iris, then build something to show off.',
      'You notice something interesting. React and maybe build something related!',
    ];
    calvinSpeak(prompts[Math.floor(Math.random()*prompts.length)]);
    setTimeout(()=>irisReact('Calvin is doing something. Say something naturally.'), 2500);
  }

  // Render
  renderer.setViewport(0,0,window.innerWidth,window.innerHeight);
  renderer.setScissorTest(false);
  renderer.render(scene, camera);

  // Mini POV
  calvinMiniR.render(scene, calvinCam);
  irisMiniR.render(scene, irisCam);
}

// ── STARTUP ───────────────────────────────────────────────────────────
async function startup() {
  const fill = document.getElementById('loadfill');
  fill.style.width = '40%';
  await new Promise(r=>setTimeout(r,500));
  fill.style.width = '80%';
  document.getElementById('loadmsg').textContent = 'Waking up Calvin and Iris...';
  await new Promise(r=>setTimeout(r,400));
  fill.style.width = '100%';
  await new Promise(r=>setTimeout(r,300));
  document.getElementById('loading').style.display = 'none';

  animate();

  setTimeout(()=>{
    calvinSpeak("You've just woken up in a brand new 3D world for the first time! Introduce yourself, say hi to Iris, and build something to kick things off!");
  }, 600);
  setTimeout(()=>{
    irisReact("Calvin just woke up in our new world! Say hello and make a little joke about your new home.");
  }, 3200);
}

startup();
</script>
